  <text x="170" y="578" text-anchor="middle" fill="#c44" font-size="9">compute_mode:</text>
  <text x="170" y="590" text-anchor="middle" fill="#c44" font-size="9">record / window</text>
  <text x="170" y="602" text-anchor="middle" fill="#c44" font-size="9">window_type:</text>
  <text x="170" y="614" text-anchor="middle" fill="#c44" font-size="9">sliding / timed</text>

  <!-- StrategyManager -->
  <rect x="290" y="540" width="240" height="80" rx="5" fill="#ffe3e3"/>
  <text x="410" y="562" text-anchor="middle" fill="#ee5a5a" font-size="11" font-weight="bold">StrategyManager</text>
  <text x="410" y="578" text-anchor="middle" fill="#c44" font-size="9">bind datasource</text>
  <text x="410" y="590" text-anchor="middle" fill="#c44" font-size="9">start/stop/restart</text>
  <text x="410" y="602" text-anchor="middle" fill="#c44" font-size="9">experiment mode</text>
  <text x="410" y="614" text-anchor="middle" fill="#c44" font-size="9">restore running</text>

  <!-- Strategy Types -->
  <rect x="70" y="635" width="460" height="50" rx="5" fill="#ffcccc"/>
  <text x="300" y="655" text-anchor="middle" fill="#c44" font-size="11" font-weight="bold">strategy_type: legacy / river / plugin / multi_datasource</text>
  <text x="300" y="675" text-anchor="middle" fill="#c44" font-size="9">handler_type: radar / memory / bandit / llm / unknown</text>

  <!-- Output -->
  <rect x="70" y="700" width="460" height="55" rx="5" fill="#ffb3b3"/>
  <text x="300" y="720" text-anchor="middle" fill="#990000" font-size="11" font-weight="bold">OUTPUT CONTROLLER</text>
  <text x="300" y="738" text-anchor="middle" fill="#990000" font-size="9">Signal / Radar / Memory / Bandit</text>
  <text x="300" y="750" text-anchor="middle" fill="#990000" font-size="9">ResultStore (持久化)</text>

  <!-- ========== ATTENTION STRATEGIES ========== -->
  <rect x="580" y="490" width="400" height="280" rx="8" fill="white" stroke="#9d4edd" stroke-width="2" filter="url(#shadow)"/>
  <rect x="580" y="490" width="400" height="35" rx="8" fill="url(#attentionV2Grad)"/>
  <text x="780" y="513" text-anchor="middle" fill="white" font-size="14" font-weight="bold">🎯 NAJA_ATTENTION_STRATEGIES</text>

  <rect x="600" y="540" width="360" height="35" rx="5" fill="#f0e6ff"/>
  <text x="780" y="562" text-anchor="middle" fill="#7b2cbf" font-size="11" font-weight="bold">GlobalMarketSentinel - 全局市场监控</text>

  <rect x="600" y="585" width="360" height="35" rx="5" fill="#f0e6ff"/>
  <text x="780" y="607" text-anchor="middle" fill="#7b2cbf" font-size="11" font-weight="bold">SectorRotationHunter - 板块轮动捕捉</text>

  <rect x="600" y="630" width="360" height="35" rx="5" fill="#f0e6ff"/>
  <text x="780" y="652" text-anchor="middle" fill="#7b2cbf" font-size="11" font-weight="bold">MomentumSurgeTracker - 动量突破追踪</text>

  <rect x="600" y="675" width="360" height="35" rx="5" fill="#f0e6ff"/>
  <text x="780" y="697" text-anchor="middle" fill="#7b2cbf" font-size="11" font-weight="bold">AnomalyPatternSniper - 异常模式狙击</text>

  <rect x="600" y="720" width="360" height="35" rx="5" fill="#e6d9ff"/>
  <text x="780" y="742" text-anchor="middle" fill="#7b2cbf" font-size="11" font-weight="bold">SmartMoneyFlowDetector - 聪明资金检测</text>

  <rect x="600" y="765" width="360" height="55" rx="5" fill="#d4c4e8"/>
  <text x="780" y="787" text-anchor="middle" fill="#5a189a" font-size="11" font-weight="bold">AttentionStrategyManager</text>
  <text x="780" y="802" text-anchor="middle" fill="#5a189a" font-size="9">基于注意力调度，只在高注意力时执行</text>
  <text x="780" y="814" text-anchor="middle" fill="#5a189a" font-size="9">实验模式支持 (start_experiment)</text>

  <!-- ========== FLOW ARROWS ========== -->

  <!-- DataSource → Attention V1 -->
  <path d="M 350 180 Q 365 180 365 200 Q 365 250 380 250" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="358" y="210" fill="#666" font-size="9">Market</text>
  <text x="358" y="222" fill="#666" font-size="9">Snapshot</text>

  <!-- Attention V1 → V2 -->
  <path d="M 680 280 L 710 280" fill="none" stroke="#7b2cbf" stroke-width="2" stroke-dasharray="5,2"/>
  <text x="692" y="272" fill="#7b2cbf" font-size="9">增强</text>

  <!-- V2 → Bandit -->
  <path d="M 1030 280 L 1060 280" fill="none" stroke="#2667ff" stroke-width="2"/>
  <text x="1042" y="272" fill="#2667ff" font-size="9">策略</text>
  <text x="1042" y="284" fill="#2667ff" font-size="9">选择</text>

  <!-- DataSource → Strategy -->
  <path d="M 200 470 L 200 490" fill="none" stroke="#ee5a5a" stroke-width="2"/>
  <text x="172" y="482" fill="#ee5a5a" font-size="9">数据流</text>

  <!-- Attention V1 → Strategy -->
  <path d="M 450 475 Q 300 485 300 490" fill="none" stroke="#ee5a5a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="380" y="478" fill="#ee5a5a" font-size="8">注意力参数</text>

  <!-- Strategy → Attention Strategies -->
  <path d="M 550 640 L 580 640" fill="none" stroke="#9d4edd" stroke-width="2"/>
  <text x="562" y="632" fill="#9d4edd" font-size="9">绑定</text>

  <!-- Bandit → Strategy -->
  <path d="M 1100 350 Q 1100 400 700 450 Q 400 480 300 490" fill="none" stroke="#2667ff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="750" y="440" fill="#2667ff" font-size="8">策略调节/反馈</text>

  <!-- Bandit → Virtual -->
  <path d="M 1205 320 L 1205 220" fill="none" stroke="#2667ff" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Attention V2 Feedback → V1 -->
  <path d="M 870 90 L 530 90 L 530 130" fill="none" stroke="#7b2cbf" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="700" y="85" fill="#7b2cbf" font-size="8">Feedback</text>

  <!-- Strategy → Bandit -->
  <path d="M 300 770 L 1205 770 L 1205 410" fill="none" stroke="#ee5a5a" stroke-width="1.5"/>
  <text x="900" y="760" fill="#ee5a5a" font-size="8">策略输出</text>

  <!-- ========== LEGEND ========== -->
  <rect x="1010" y="490" width="340" height="280" rx="8" fill="white" stroke="#888" stroke-width="1" filter="url(#shadow)"/>
  <text x="1180" y="515" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">📋 数据流说明</text>

  <line x1="1030" y1="535" x2="1070" y2="535" stroke="#2d6a4f" stroke-width="3"/>
  <text x="1080" y="539" fill="#333" font-size="11">DataSource 产生市场数据</text>

  <line x1="1030" y1="565" x2="1070" y2="565" stroke="#c4570e" stroke-width="3"/>
  <text x="1080" y="569" fill="#333" font-size="11">Attention V1 计算注意力权重</text>

  <line x1="1030" y1="595" x2="1070" y2="595" stroke="#7b2cbf" stroke-width="3" stroke-dasharray="5,2"/>
  <text x="1080" y="599" fill="#333" font-size="11">Attention V2 增强预测/反馈</text>

  <line x1="1030" y1="625" x2="1070" y2="625" stroke="#2667ff" stroke-width="3"/>
  <text x="1080" y="629" fill="#333" font-size="11">Bandit 策略选择与优化</text>

  <line x1="1030" y1="655" x2="1070" y2="655" stroke="#ee5a5a" stroke-width="3"/>
  <text x="1080" y="659" fill="#333" font-size="11">Strategy 执行策略逻辑</text>

  <line x1="1030" y1="685" x2="1070" y2="685" stroke="#9d4edd" stroke-width="3"/>
  <text x="1080" y="689" fill="#333" font-size="11">Attention Strategies 注意力策略</text>

  <line x1="1030" y1="715" x2="1070" y2="715" stroke="#555" stroke-width="3" stroke-dasharray="3,2"/>
  <text x="1080" y="719" fill="#333" font-size="11">反馈调节回路</text>

  <!-- Key Flow Numbers -->
  <text x="1030" y="750" fill="#666" font-size="10" font-weight="bold">核心流程:</text>
  <text x="1030" y="768" fill="#666" font-size="9">① DataSource → ② Attention(V1+V2)</text>
  <text x="1030" y="782" fill="#666" font-size="9">③ Bandit策略选择 → ④ Strategy执行</text>
  <text x="1030" y="796" fill="#666" font-size="9">⑤ 结果反馈 → 注意力调整</text>

</svg>
