  <rect x="1080" y="140" width="250" height="35" rx="5" fill="#d4e6ff"/>
  <text x="1205" y="163" text-anchor="middle" fill="#2667ff" font-size="11" font-weight="bold">SignalListener - 信号监听</text>

  <rect x="1080" y="185" width="250" height="35" rx="5" fill="#d4e6ff"/>
  <text x="1205" y="208" text-anchor="middle" fill="#2667ff" font-size="11" font-weight="bold">VirtualPortfolio - 虚拟持仓</text>

  <rect x="1080" y="230" width="250" height="35" rx="5" fill="#d4e6ff"/>
  <text x="1205" y="253" text-anchor="middle" fill="#2667ff" font-size="11" font-weight="bold">MarketObserver - 市场观察</text>

  <rect x="1080" y="275" width="250" height="35" rx="5" fill="#a3c9ff"/>
  <text x="1205" y="298" text-anchor="middle" fill="#2667ff" font-size="11" font-weight="bold">AdaptiveCycle - 自适应循环</text>

  <rect x="1080" y="320" width="250" height="35" rx="5" fill="#a3c9ff"/>
  <text x="1205" y="343" text-anchor="middle" fill="#2667ff" font-size="11" font-weight="bold">BanditOptimizer - 策略优化</text>

  <rect x="1080" y="365" width="250" height="35" rx="5" fill="#a3c9ff"/>
  <text x="1205" y="388" text-anchor="middle" fill="#2667ff" font-size="11" font-weight="bold">BanditAutoRunner - 自动运行</text>

  <rect x="1080" y="410" width="250" height="45" rx="5" fill="#7eb8ff"/>
  <text x="1205" y="430" text-anchor="middle" fill="#1a4499" font-size="10" font-weight="bold">XiaoHeBanditIntegration</text>
  <text x="1205" y="445" text-anchor="middle" fill="#1a4499" font-size="9">与小何系统的集成</text>

  <!-- ========== STRATEGY LAYER ========== -->
  <rect x="50" y="490" width="500" height="280" rx="8" fill="white" stroke="#ee5a5a" stroke-width="2" filter="url(#shadow)"/>
  <rect x="50" y="490" width="500" height="35" rx="8" fill="url(#strategyGrad)"/>
  <text x="300" y="513" text-anchor="middle" fill="white" font-size="14" font-weight="bold">⚡ STRATEGY 策略层</text>

  <!-- Strategy Entry -->
  <rect x="70" y="540" width="200" height="80" rx="5" fill="#ffe3e3"/>
