<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="datasourceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d6a4f"/>
      <stop offset="100%" style="stop-color:#1b4332"/>
    </linearGradient>
    <linearGradient id="attentionV1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e07b39"/>
      <stop offset="100%" style="stop-color:#c4570e"/>
    </linearGradient>
    <linearGradient id="attentionV2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9d4edd"/>
      <stop offset="100%" style="stop-color:#7b2cbf"/>
    </linearGradient>
    <linearGradient id="banditGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a86ff"/>
      <stop offset="100%" style="stop-color:#2667ff"/>
    </linearGradient>
    <linearGradient id="strategyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a5a"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#888"/>
      <stop offset="100%" style="stop-color:#555"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1000" fill="#f5f5f5"/>

  <!-- Title -->
  <rect x="50" y="20" width="1300" height="50" rx="8" fill="url(#headerGrad)"/>
  <text x="700" y="52" text-anchor="middle" fill="white" font-size="22" font-weight="bold">
    Naja 量化系统架构总览
  </text>

  <!-- ========== DATASOURCE LAYER ========== -->
  <rect x="50" y="90" width="300" height="380" rx="8" fill="white" stroke="#2d6a4f" stroke-width="2" filter="url(#shadow)"/>
  <rect x="50" y="90" width="300" height="35" rx="8" fill="url(#datasourceGrad)"/>
  <text x="200" y="113" text-anchor="middle" fill="white" font-size="14" font-weight="bold">📊 DATASOURCE 数据源层</text>

  <!-- DataSource Types -->
  <rect x="70" y="140" width="260" height="40" rx="5" fill="#d8f3dc"/>
  <text x="200" y="166" text-anchor="middle" fill="#1b4332" font-size="12" font-weight="bold">timer / scheduler / replay</text>

  <rect x="70" y="190" width="260" height="40" rx="5" fill="#d8f3dc"/>
  <text x="200" y="216" text-anchor="middle" fill="#1b4332" font-size="12" font-weight="bold">file / directory 监控</text>

  <rect x="70" y="240" width="260" height="40" rx="5" fill="#d8f3dc"/>
  <text x="200" y="266" text-anchor="middle" fill="#1b4332" font-size="12" font-weight="bold">event_trigger 事件触发</text>

  <rect x="70" y="290" width="260" height="40" rx="5" fill="#b7e4c7"/>
  <text x="200" y="316" text-anchor="middle" fill="#1b4332" font-size="12" font-weight="bold">自定义 fetch_data()</text>

  <rect x="70" y="340" width="260" height="40" rx="5" fill="#95d5b2"/>
  <text x="200" y="366" text-anchor="middle" fill="#1b4332" font-size="12" font-weight="bold">NS Stream 输出</text>

  <rect x="70" y="390" width="260" height="60" rx="5" fill="#74c69d"/>
  <text x="200" y="415" text-anchor="middle" fill="#1b4332" font-size="11">DataSourceEntry</text>
  <text x="200" y="435" text-anchor="middle" fill="#1b4332" font-size="11">(RecoverableUnit)</text>

  <!-- ========== ATTENTION V1 LAYER ========== -->
  <rect x="380" y="90" width="300" height="380" rx="8" fill="white" stroke="#c4570e" stroke-width="2" filter="url(#shadow)"/>
  <rect x="380" y="90" width="300" height="35" rx="8" fill="url(#attentionV1Grad)"/>
  <text x="530" y="113" text-anchor="middle" fill="white" font-size="14" font-weight="bold">🔥 ATTENTION V1 注意力系统</text>

  <!-- Module 1 -->
  <rect x="400" y="140" width="260" height="45" rx="5" fill="#fde4cf"/>
  <text x="530" y="160" text-anchor="middle" fill="#c4570e" font-size="11" font-weight="bold">1. Global Attention</text>
  <text x="530" y="175" text-anchor="middle" fill="#8b4513" font-size="10">市场波动 + 成交量 + 涨跌分布</text>

  <!-- Module 2 -->
  <rect x="400" y="195" width="260" height="45" rx="5" fill="#fde4cf"/>
  <text x="530" y="215" text-anchor="middle" fill="#c4570e" font-size="11" font-weight="bold">2. Sector Attention</text>
  <text x="530" y="230" text-anchor="middle" fill="#8b4513" font-size="10">板块领涨 + 成交集中 + 相关性</text>

  <!-- Module 3 -->
  <rect x="400" y="250" width="260" height="45" rx="5" fill="#fde4cf"/>
  <text x="530" y="270" text-anchor="middle" fill="#c4570e" font-size="11" font-weight="bold">3. Weight Pool</text>
  <text x="530" y="285" text-anchor="middle" fill="#8b4513" font-size="10">个股 ↔ 多板块 多对多映射</text>

  <!-- Module 4 -->
  <rect x="400" y="305" width="260" height="45" rx="5" fill="#fde4cf"/>
  <text x="530" y="325" text-anchor="middle" fill="#c4570e" font-size="11" font-weight="bold">4. Frequency Scheduler</text>
  <text x="530" y="340" text-anchor="middle" fill="#8b4513" font-size="10">LOW(60s) / MEDIUM(10s) / HIGH(1s)</text>

  <!-- Module 5 -->
  <rect x="400" y="360" width="260" height="45" rx="5" fill="#fde4cf"/>
  <text x="530" y="380" text-anchor="middle" fill="#c4570e" font-size="11" font-weight="bold">5. Strategy Allocation</text>
  <text x="530" y="395" text-anchor="middle" fill="#8b4513" font-size="10">Global / Sector / Symbol 三层</text>

  <!-- Module 6 -->
  <rect x="400" y="415" width="260" height="45" rx="5" fill="#fdd9b5"/>
  <text x="530" y="435" text-anchor="middle" fill="#c4570e" font-size="11" font-weight="bold">6. Dual Engine</text>
  <text x="530" y="450" text-anchor="middle" fill="#8b4513" font-size="10">River(O(1)) + PyTorch(异常)</text>

  <!-- ========== ATTENTION V2 LAYER ========== -->
  <rect x="710" y="90" width="320" height="380" rx="8" fill="white" stroke="#7b2cbf" stroke-width="2" filter="url(#shadow)"/>
  <rect x="710" y="90" width="320" height="35" rx="8" fill="url(#attentionV2Grad)"/>
  <text x="870" y="113" text-anchor="middle" fill="white" font-size="14" font-weight="bold">🧠 ATTENTION V2 增强层</text>

  <!-- V2 Modules -->
  <rect x="730" y="140" width="280" height="40" rx="5" fill="#e8daef"/>
  <text x="870" y="158" text-anchor="middle" fill="#7b2cbf" font-size="11" font-weight="bold">7. Predictive Attention Engine</text>
  <text x="870" y="172" text-anchor="middle" fill="#5a189a" font-size="9">EMA加速 / 二阶导数 / 动量预测</text>

  <rect x="730" y="190" width="280" height="40" rx="5" fill="#e8daef"/>
  <text x="870" y="208" text-anchor="middle" fill="#7b2cbf" font-size="11" font-weight="bold">8. Attention Feedback Loop</text>
  <text x="870" y="222" text-anchor="middle" fill="#5a189a" font-size="9">策略结果 → 注意力调整</text>

  <rect x="730" y="240" width="280" height="40" rx="5" fill="#e8daef"/>
  <text x="870" y="258" text-anchor="middle" fill="#7b2cbf" font-size="11" font-weight="bold">9. Attention Budget System</text>
  <text x="870" y="272" text-anchor="middle" fill="#5a189a" font-size="9">Tier1/2/3 预算分配 + Top-K</text>

  <rect x="730" y="290" width="280" height="40" rx="5" fill="#e8daef"/>
  <text x="870" y="308" text-anchor="middle" fill="#7b2cbf" font-size="11" font-weight="bold">10. Attention Propagation</text>
  <text x="870" y="322" text-anchor="middle" fill="#5a189a" font-size="9">注意力扩散 / 关联板块</text>

  <rect x="730" y="340" width="280" height="40" rx="5" fill="#d7bde2"/>
  <text x="870" y="358" text-anchor="middle" fill="#7b2cbf" font-size="11" font-weight="bold">11. Strategy Learning</text>
  <text x="870" y="372" text-anchor="middle" fill="#5a189a" font-size="9">Market State → Bandit策略选择</text>

  <rect x="730" y="390" width="280" height="60" rx="5" fill="#c39bd3"/>
  <text x="870" y="415" text-anchor="middle" fill="#5a189a" font-size="11" font-weight="bold">V2EnhancedAttentionSystem</text>
  <text x="870" y="435" text-anchor="middle" fill="#7b2cbf" font-size="10">Backward Compatible + Progressive</text>

  <!-- ========== BANDIT LAYER ========== -->
  <rect x="1060" y="90" width="290" height="380" rx="8" fill="white" stroke="#2667ff" stroke-width="2" filter="url(#shadow)"/>
  <rect x="1060" y="90" width="290" height="35" rx="8" fill="url(#banditGrad)"/>
