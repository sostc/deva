<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 900" width="400" height="900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="fastGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="slowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#533483"/>
      <stop offset="100%" style="stop-color:#2d1b69"/>
    </linearGradient>
  </defs>

  <rect width="400" height="900" fill="url(#bg)" rx="20"/>

  <text x="200" y="45" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold" font-family="Arial, sans-serif">Two-Layer Cognition</text>
  <text x="200" y="70" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Arial, sans-serif">Real-time -&gt; Accumulate -&gt; LLM</text>

  <!-- Fast Cognition Layer -->
  <rect x="20" y="90" width="360" height="320" rx="12" fill="url(#fastGrad)" stroke="#0ea5e9" stroke-width="2"/>
  <text x="200" y="120" text-anchor="middle" fill="#0ea5e9" font-size="15" font-weight="bold" font-family="Arial, sans-serif">[ Fast Cognition Layer ]</text>
  <text x="200" y="140" text-anchor="middle" fill="#64748b" font-size="10" font-family="Arial, sans-serif">Real-time Processing | Event-Driven</text>

  <!-- Modules -->
  <g transform="translate(35, 160)">
    <rect width="155" height="35" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#93c5fd" font-size="11" font-family="Arial, sans-serif">* NewsMind</text>
  </g>
  <g transform="translate(210, 160)">
    <rect width="155" height="35" rx="6" fill="#1e3a5f" stroke="#8b5cf6" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#c4b5fd" font-size="11" font-family="Arial, sans-serif">* NarrativeTracker</text>
  </g>

  <g transform="translate(35, 205)">
    <rect width="155" height="35" rx="6" fill="#1e3a5f" stroke="#f97316" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#fdba74" font-size="11" font-family="Arial, sans-serif">* CrossSignal</text>
  </g>
  <g transform="translate(210, 205)">
    <rect width="155" height="35" rx="6" fill="#1e3a5f" stroke="#22c55e" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#86efac" font-size="11" font-family="Arial, sans-serif">* PropagationEngine</text>
  </g>

  <g transform="translate(35, 250)">
    <rect width="155" height="35" rx="6" fill="#1e3a5f" stroke="#f59e0b" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#fcd34d" font-size="11" font-family="Arial, sans-serif">* AttentionSystem</text>
  </g>
  <g transform="translate(210, 250)">
    <rect width="155" height="35" rx="6" fill="#1e3a5f" stroke="#ec4899" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#f9a8d4" font-size="11" font-family="Arial, sans-serif">* HistoryTracker</text>
  </g>

  <g transform="translate(35, 295)">
    <rect width="155" height="35" rx="6" fill="#1e3a5f" stroke="#ef4444" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#fca5a5" font-size="11" font-family="Arial, sans-serif">* OpenRouter Monitor</text>
  </g>
  <g transform="translate(210, 295)">
    <rect width="155" height="35" rx="6" fill="#1e3a5f" stroke="#14b8a6" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#5eead4" font-size="11" font-family="Arial, sans-serif">* Radar Events</text>
  </g>

  <g transform="translate(35, 340)">
    <rect width="330" height="35" rx="6" fill="#1e3a5f" stroke="#6366f1" stroke-width="1"/>
    <text x="165" y="22" text-anchor="middle" fill="#a5b4fc" font-size="11" font-family="Arial, sans-serif">* FeedbackLoop</text>
  </g>

  <!-- Arrow -->
  <line x1="200" y1="425" x2="200" y2="445" stroke="#00d9ff" stroke-width="3"/>
  <polygon points="200,450 192,438 208,438" fill="#00d9ff"/>

  <!-- Slow Cognition Layer -->
  <rect x="20" y="460" width="360" height="280" rx="12" fill="url(#slowGrad)" stroke="#8b5cf6" stroke-width="2"/>
  <text x="200" y="490" text-anchor="middle" fill="#a78bfa" font-size="15" font-weight="bold" font-family="Arial, sans-serif">[ Slow Cognition Layer ]</text>
  <text x="200" y="510" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Arial, sans-serif">Accumulate | Aggregate | LLM Reflection</text>

  <!-- InsightPool -->
  <rect x="40" y="525" width="320" height="110" rx="10" fill="#2d1b4e" stroke="#a78bfa" stroke-width="2"/>
  <text x="200" y="550" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="bold" font-family="Arial, sans-serif">InsightPool</text>

  <g transform="translate(55, 565)">
    <text x="0" y="14" fill="#f97316" font-size="10" font-family="Arial, sans-serif">- narrative_stage_change</text>
    <text x="0" y="30" fill="#3b82f6" font-size="10" font-family="Arial, sans-serif">- news_topic</text>
    <text x="0" y="46" fill="#22c55e" font-size="10" font-family="Arial, sans-serif">- liquidity_propagation</text>
  </g>
  <g transform="translate(200, 565)">
    <text x="0" y="14" fill="#f59e0b" font-size="10" font-family="Arial, sans-serif">- resonance_</text>
    <text x="0" y="30" fill="#ec4899" font-size="10" font-family="Arial, sans-serif">- attention</text>
    <text x="0" y="46" fill="#8b5cf6" font-size="10" font-family="Arial, sans-serif">- llm_reflection</text>
  </g>

  <!-- LLM Reflection -->
  <rect x="40" y="655" width="320" height="55" rx="10" fill="#3b1f6e" stroke="#c4b5fd" stroke-width="2"/>
  <text x="200" y="680" text-anchor="middle" fill="#e9d5ff" font-size="13" font-weight="bold" font-family="Arial, sans-serif">LLM Reflection Engine</text>
  <text x="200" y="698" text-anchor="middle" fill="#c4b5fd" font-size="10" font-family="Arial, sans-serif">Iterative Thinking | Reference History</text>

  <!-- Output -->
  <rect x="20" y="725" width="360" height="95" rx="12" fill="#1e3a5f" stroke="#22c55e" stroke-width="2"/>
  <text x="200" y="755" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="bold" font-family="Arial, sans-serif">[ Output ]</text>
  <text x="200" y="780" text-anchor="middle" fill="#86efac" font-size="10" font-family="Arial, sans-serif">theme | summary | confidence</text>
  <text x="200" y="800" text-anchor="middle" fill="#86efac" font-size="10" font-family="Arial, sans-serif">liquidity_structure | iteration</text>

  <!-- Feature -->
  <rect x="20" y="835" width="360" height="50" rx="8" fill="#0f3460" stroke="#475569" stroke-width="1"/>
  <text x="200" y="860" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Arial, sans-serif">Fast Discovery | Slow Thinking</text>
  <text x="200" y="875" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="Arial, sans-serif">Iterative Refinement</text>
</svg>
