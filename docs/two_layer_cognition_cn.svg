<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 900" width="400" height="900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="fastGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="slowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#533483"/>
      <stop offset="100%" style="stop-color:#2d1b69"/>
    </linearGradient>
  </defs>

  <rect width="400" height="900" fill="url(#bg)" rx="20"/>

  <text x="200" y="45" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">🧠 双层认知架构</text>
  <text x="200" y="70" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">实时处理 → 积累 → LLM反思</text>

  <!-- 快速认知层 -->
  <rect x="20" y="95" width="360" height="320" rx="12" fill="url(#fastGrad)" stroke="#0ea5e9" stroke-width="2"/>
  <text x="200" y="125" text-anchor="middle" fill="#0ea5e9" font-size="15" font-weight="bold" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">⚡ 快速认知层</text>
  <text x="200" y="145" text-anchor="middle" fill="#64748b" font-size="10" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">实时处理 · 事件驱动</text>

  <!-- 模块 -->
  <g transform="translate(35, 165)">
    <rect width="155" height="35" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#93c5fd" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">📰 新闻思维</text>
  </g>
  <g transform="translate(210, 165)">
    <rect width="155" height="35" rx="6" fill="#1e3a5f" stroke="#8b5cf6" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#c4b5fd" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">🌊 叙事追踪</text>
  </g>

  <g transform="translate(35, 210)">
    <rect width="155" height="35" rx="6" fill="#1e3a5f" stroke="#f97316" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#fdba74" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">🔄 信号共振</text>
  </g>
  <g transform="translate(210, 210)">
    <rect width="155" height="35" rx="6" fill="#1e3a5f" stroke="#22c55e" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#86efac" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">💰 流动性传播</text>
  </g>

  <g transform="translate(35, 255)">
    <rect width="155" height="35" rx="6" fill="#1e3a5f" stroke="#f59e0b" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#fcd34d" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">👁️ 注意力系统</text>
  </g>
  <g transform="translate(210, 255)">
    <rect width="155" height="35" rx="6" fill="#1e3a5f" stroke="#ec4899" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#f9a8d4" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">📊 历史追踪</text>
  </g>

  <g transform="translate(35, 300)">
    <rect width="155" height="35" rx="6" fill="#1e3a5f" stroke="#ef4444" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#fca5a5" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">🤖 TOKEN监控</text>
  </g>
  <g transform="translate(210, 300)">
    <rect width="155" height="35" rx="6" fill="#1e3a5f" stroke="#14b8a6" stroke-width="1"/>
    <text x="78" y="22" text-anchor="middle" fill="#5eead4" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">📡 雷达事件</text>
  </g>

  <g transform="translate(35, 345)">
    <rect width="330" height="35" rx="6" fill="#1e3a5f" stroke="#6366f1" stroke-width="1"/>
    <text x="165" y="22" text-anchor="middle" fill="#a5b4fc" font-size="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">📊 反馈循环</text>
  </g>

  <!-- 箭头 -->
  <line x1="200" y1="430" x2="200" y2="450" stroke="#00d9ff" stroke-width="3"/>
  <polygon points="200,455 190,443 210,443" fill="#00d9ff"/>

  <!-- 慢速认知层 -->
  <rect x="20" y="465" width="360" height="280" rx="12" fill="url(#slowGrad)" stroke="#8b5cf6" stroke-width="2"/>
  <text x="200" y="495" text-anchor="middle" fill="#a78bfa" font-size="15" font-weight="bold" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">📦 慢速认知层</text>
  <text x="200" y="515" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">积累 · 聚合 · LLM反思</text>

  <!-- 洞察池 -->
  <rect x="40" y="530" width="320" height="115" rx="10" fill="#2d1b4e" stroke="#a78bfa" stroke-width="2"/>
  <text x="200" y="555" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="bold" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">💡 洞察池</text>

  <g transform="translate(55, 570)">
    <text x="0" y="14" fill="#f97316" font-size="10" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">● 叙事阶段变化</text>
    <text x="0" y="30" fill="#3b82f6" font-size="10" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">● 新闻主题</text>
    <text x="0" y="46" fill="#22c55e" font-size="10" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">● 流动性传播</text>
  </g>
  <g transform="translate(200, 570)">
    <text x="0" y="14" fill="#f59e0b" font-size="10" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">● 共振信号</text>
    <text x="0" y="30" fill="#ec4899" font-size="10" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">● 注意力</text>
    <text x="0" y="46" fill="#8b5cf6" font-size="10" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">● LLM反思</text>
  </g>

  <!-- LLM反思 -->
  <rect x="40" y="660" width="320" height="55" rx="10" fill="#3b1f6e" stroke="#c4b5fd" stroke-width="2"/>
  <text x="200" y="685" text-anchor="middle" fill="#e9d5ff" font-size="13" font-weight="bold" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">🤖 LLM 反思引擎</text>
  <text x="200" y="703" text-anchor="middle" fill="#c4b5fd" font-size="10" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">迭代思考 · 参考历史</text>

  <!-- 输出 -->
  <rect x="20" y="730" width="360" height="100" rx="12" fill="#1e3a5f" stroke="#22c55e" stroke-width="2"/>
  <text x="200" y="760" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="bold" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">✅ 输出成果</text>
  <text x="200" y="785" text-anchor="middle" fill="#86efac" font-size="10" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">主题 · 总结 · 置信度</text>
  <text x="200" y="805" text-anchor="middle" fill="#86efac" font-size="10" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">流动性结构 · 迭代关系</text>

  <!-- 特点 -->
  <rect x="20" y="845" width="360" height="45" rx="8" fill="#0f3460" stroke="#475569" stroke-width="1"/>
  <text x="200" y="868" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">⚡ 快速发现 · 📦 慢速思考</text>
  <text x="200" y="883" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">🔄 迭代优化</text>
</svg>
