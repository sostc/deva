<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 850">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowhead-yellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#eab308"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="850" fill="#f8fafc"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1e293b">数据 → 知识 → 决策 完整流程</text>

  <!-- ==================== 数据源层 ==================== -->
  <rect x="40" y="65" width="1020" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#475569">数据源层</text>

  <!-- AI情报员 -->
  <rect x="70" y="115" width="180" height="60" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="160" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">AI情报员</text>
  <text x="160" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3b82f6">ai_daily_report</text>

  <!-- 文章学习器 -->
  <rect x="280" y="115" width="180" height="60" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="370" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#166534">文章学习器</text>
  <text x="370" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#22c55e">article_learner</text>

  <!-- NewsMind -->
  <rect x="490" y="115" width="180" height="60" rx="8" fill="#fef3c7" stroke="#eab308" stroke-width="1.5"/>
  <text x="580" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">NewsMind</text>
  <text x="580" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#eab308">实时新闻流</text>

  <!-- 数据源详情 -->
  <rect x="700" y="105" width="340" height="80" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="720" y="125" font-family="Arial, sans-serif" font-size="11" fill="#64748b">数据来源：</text>
  <text x="720" y="142" font-family="Arial, sans-serif" font-size="10" fill="#475569">• arXiv / HuggingFace / GitHub / HN</text>
  <text x="720" y="157" font-family="Arial, sans-serif" font-size="10" fill="#475569">• 微信公众号 / 网页链接 / Twitter</text>
  <text x="720" y="172" font-family="Arial, sans-serif" font-size="10" fill="#475569">• 实时新闻流 / 消息面</text>

  <!-- ==================== 箭头：数据源→知识处理 ==================== -->
  <line x1="550" y1="195" x2="550" y2="225" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ==================== 知识处理层 ==================== -->
  <rect x="40" y="230" width="1020" height="260" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#475569">知识处理层</text>

  <!-- AIKnowledgeInjector -->
  <rect x="60" y="280" width="340" height="190" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="230" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6d28d9">AIKnowledgeInjector</text>
  <text x="230" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8b5cf6">因果知识评估与注入</text>

  <text x="75" y="350" font-family="Arial, sans-serif" font-size="10" fill="#475569">输入：</text>
  <text x="75" y="368" font-family="Arial, sans-serif" font-size="10" fill="#64748b">• AI情报员 → 提取因果关系</text>
  <text x="75" y="385" font-family="Arial, sans-serif" font-size="10" fill="#64748b">• 文章学习器 → 深度分析结果</text>
  <text x="75" y="402" font-family="Arial, sans-serif" font-size="10" fill="#64748b">• NewsMind → 新闻情绪/话题</text>

  <text x="75" y="425" font-family="Arial, sans-serif" font-size="10" fill="#dc2626">⚠️ 新知识进入7天观察期</text>
  <text x="75" y="442" font-family="Arial, sans-serif" font-size="10" fill="#dc2626">⚠️ 多源验证才提升置信度</text>
  <text x="75" y="459" font-family="Arial, sans-serif" font-size="10" fill="#dc2626">⚠️ 重大事件直接进入验证期</text>

  <!-- 因果知识库 -->
  <rect x="420" y="280" width="260" height="190" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="550" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#166534">因果知识库</text>
  <text x="550" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">causality_knowledge_v2.json</text>

  <!-- 状态流转图 -->
  <rect x="445" y="355" width="80" height="35" rx="4" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
  <text x="485" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#854d0e">observing</text>
  <text x="485" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#854d0e">(7天)</text>
  <line x1="525" y1="372" x2="550" y2="372" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead-yellow)"/>

  <rect x="550" y="355" width="80" height="35" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="590" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e40af">validating</text>
  <text x="590" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e40af">(验证中)</text>
  <line x1="630" y1="372" x2="655" y2="372" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead-yellow)"/>

  <rect x="655" y="355" width="80" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="695" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">qualified</text>
  <text x="695" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#166534">(参与决策)</text>

  <text x="445" y="430" font-family="Arial, sans-serif" font-size="10" fill="#64748b">路径: ~/.naja/ai_knowledge/</text>

  <!-- narratives.json -->
  <rect x="710" y="280" width="160" height="85" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="790" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#475569">narratives.json</text>
  <text x="790" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">叙事库</text>
  <text x="790" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">article_learner 写入</text>

  <!-- article_knowledge -->
  <rect x="890" y="280" width="150" height="85" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="965" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#475569">article_knowledge</text>
  <text x="965" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">文章分析结果</text>
  <text x="965" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">article_learner 写入</text>

  <!-- NarrativeTracker -->
  <rect x="710" y="390" width="160" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="790" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e40af">NarrativeTracker</text>
  <text x="790" y="433" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3b82f6">追踪叙事状态与流转</text>
  <text x="790" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">get_summary() / get_problem_opportunity_summary()</text>

  <!-- 箭头：文章学习器 → narratives.json -->
  <line x1="370" y1="195" x2="790" y2="290" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowhead-green)"/>
  <text x="530" y="235" font-family="Arial, sans-serif" font-size="9" fill="#22c55e">写入</text>

  <!-- 箭头：Injector → 知识库 -->
  <line x1="400" y1="375" x2="410" y2="375" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowhead-purple)"/>

  <!-- 箭头：narratives.json → NarrativeTracker -->
  <line x1="790" y1="365" x2="790" y2="380" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowhead-blue)"/>

  <!-- ==================== 箭头：知识处理→认知决策 ==================== -->
  <line x1="550" y1="490" x2="550" y2="520" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ==================== 认知决策层 ==================== -->
  <rect x="40" y="525" width="1020" height="170" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="552" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#475569">认知决策层</text>

  <!-- FirstPrinciplesMind -->
  <rect x="60" y="575" width="400" height="105" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="260" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6d28d9">FirstPrinciplesMind</text>
  <text x="260" y="618" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8b5cf6">第一性原理分析</text>

  <!-- 输入 -->
  <text x="75" y="642" font-family="Arial, sans-serif" font-size="10" fill="#475569">输入：</text>
  <text x="105" y="642" font-family="Arial, sans-serif" font-size="10" fill="#22c55e">• narratives</text>
  <text x="180" y="642" font-family="Arial, sans-serif" font-size="10" fill="#22c55e">• signals</text>
  <text x="245" y="642" font-family="Arial, sans-serif" font-size="10" fill="#22c55e">• topic_signals</text>
  <text x="345" y="642" font-family="Arial, sans-serif" font-size="10" fill="#22c55e">• news_sentiment</text>
  <text x="105" y="658" font-family="Arial, sans-serif" font-size="10" fill="#22c55e">• ai_compute_trend</text>
  <text x="210" y="658" font-family="Arial, sans-serif" font-size="10" fill="#22c55e">• problem_opportunity</text>
  <text x="340" y="658" font-family="Arial, sans-serif" font-size="10" fill="#22c55e">• liquidity_data</text>

  <text x="75" y="680" font-family="Arial, sans-serif" font-size="10" fill="#64748b">处理：因果推理 / 矛盾检测 / 模式识别</text>
  <text x="75" y="698" font-family="Arial, sans-serif" font-size="10" fill="#8b5cf6">输出：FirstPrinciplesInsights (type/level/confidence)</text>

  <!-- AlayaManas -->
  <rect x="490" y="575" width="260" height="105" rx="8" fill="#fef3c7" stroke="#eab308" stroke-width="2"/>
  <text x="620" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#92400e">AlayaManas</text>
  <text x="620" y="618" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#eab308">觉醒决策</text>

  <text x="505" y="642" font-family="Arial, sans-serif" font-size="10" fill="#475569">fp_insights 输入后：</text>
  <text x="505" y="658" font-family="Arial, sans-serif" font-size="9" fill="#22c55e">• opportunity + first_principles → 置信度+0.15, 仓位+20%</text>
  <text x="505" y="672" font-family="Arial, sans-serif" font-size="9" fill="#ef4444">• risk + first_principles → 置信度-0.15, 仓位-30%</text>
  <text x="505" y="686" font-family="Arial, sans-serif" font-size="9" fill="#64748b">• opportunity + causal → 置信度+0.10, 仓位+10%</text>

  <!-- 箭头：FP → Alaya -->
  <line x1="460" y1="627" x2="480" y2="627" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowhead-purple)"/>

  <!-- 最终交易决策 -->
  <rect x="780" y="575" width="260" height="105" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="910" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#166534">最终交易决策</text>
  <text x="910" y="625" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#166534">compute_decision()</text>
  <text x="910" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">→ 买入 / 卖出 / 持有</text>
  <text x="910" y="668" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">→ 置信度 + 仓位</text>
  <text x="910" y="686" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#22c55e">→ 执行交易</text>

  <!-- 箭头：Alaya → 决策 -->
  <line x1="750" y1="627" x2="770" y2="627" stroke="#eab308" stroke-width="2" marker-end="url(#arrowhead-yellow)"/>

  <!-- ==================== 图例 ==================== -->
  <rect x="40" y="720" width="1020" height="115" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <text x="60" y="745" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e293b">完整数据流</text>

  <!-- 步骤1 -->
  <rect x="60" y="760" width="100" height="38" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="110" y="775" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e40af">1. 数据采集</text>
  <text x="110" y="788" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3b82f6">AI情报员/文章/新闻</text>

  <line x1="160" y1="779" x2="180" y2="779" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤2 -->
  <rect x="180" y="760" width="100" height="38" rx="5" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="230" y="775" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6d28d9">2. 因果提取</text>
  <text x="230" y="788" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#8b5cf6">AIKnowledgeInjector</text>

  <line x1="280" y1="779" x2="300" y2="779" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤3 -->
  <rect x="300" y="760" width="100" height="38" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
  <text x="350" y="775" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#854d0e">3. 状态流转</text>
  <text x="350" y="788" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#eab308">7天观察期验证</text>

  <line x1="400" y1="779" x2="420" y2="779" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤4 -->
  <rect x="420" y="760" width="100" height="38" rx="5" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="470" y="775" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">4. 知识存储</text>
  <text x="470" y="788" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#22c55e">因果知识库</text>

  <line x1="520" y1="779" x2="540" y2="779" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤5 -->
  <rect x="540" y="760" width="100" height="38" rx="5" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="590" y="775" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6d28d9">5. 认知分析</text>
  <text x="590" y="788" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#8b5cf6">FirstPrinciplesMind</text>

  <line x1="640" y1="779" x2="660" y2="779" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 步骤6 -->
  <rect x="660" y="760" width="100" height="38" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="710" y="775" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">6. 交易决策</text>
  <text x="710" y="788" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#22c55e">AlayaManas</text>

  <!-- 数据文件说明 -->
  <text x="800" y="775" font-family="Arial, sans-serif" font-size="10" fill="#64748b">存储路径：~/.naja/ai_knowledge/</text>
  <text x="800" y="792" font-family="Arial, sans-serif" font-size="10" fill="#64748b">因果知识库：causality_knowledge_v2.json</text>
  <text x="800" y="809" font-family="Arial, sans-serif" font-size="10" fill="#64748b">叙事库：narratives.json / article_knowledge.json</text>

</svg>