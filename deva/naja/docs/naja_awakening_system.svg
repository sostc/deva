<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="PingFang SC, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#1a1f3c"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bgGrad3)"/>

  <text x="600" y="45" text-anchor="middle" fill="#ffffff" font-size="32" font-weight="bold">觉醒系统详解</text>
  <text x="600" y="75" text-anchor="middle" fill="#8899bb" font-size="16">将军的智慧 — 从感知到决策的完整觉醒路径</text>

  <!-- 五识层 -->
  <g transform="translate(50, 110)">
    <rect x="0" y="0" width="1100" height="150" rx="12" fill="#1e2644" stroke="#5ba881" stroke-width="2" filter="url(#shadow3)"/>
    <text x="30" y="35" fill="#5ba881" font-size="22" font-weight="bold">👁️ 五识层 — 天眼通 (感知层)</text>
    <text x="30" y="60" fill="#8899bb" font-size="14">觉醒度 90% — 直接感知市场变化</text>

    <g transform="translate(30, 80)">
      <rect x="0" y="0" width="240" height="55" rx="8" fill="#253258" stroke="#5ba881"/>
      <text x="120" y="25" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">ProphetSense 预感知</text>
      <text x="120" y="43" text-anchor="middle" fill="#8899bb" font-size="11">预判市场转折点</text>

      <rect x="260" y="0" width="240" height="55" rx="8" fill="#253258" stroke="#5ba881"/>
      <text x="380" y="25" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">VolatilitySurface 波动率</text>
      <text x="380" y="43" text-anchor="middle" fill="#8899bb" font-size="11">IV曲面/skew/期限结构</text>

      <rect x="520" y="0" width="240" height="55" rx="8" fill="#253258" stroke="#5ba881"/>
      <text x="640" y="25" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">PreTaste 预尝</text>
      <text x="640" y="43" text-anchor="middle" fill="#8899bb" font-size="11">买前试探：动量/流动性</text>

      <rect x="780" y="0" width="240" height="55" rx="8" fill="#253258" stroke="#5ba881"/>
      <text x="900" y="25" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">RealtimeTaste 舌识</text>
      <text x="900" y="43" text-anchor="middle" fill="#8899bb" font-size="11">实时品味行情</text>
    </g>
  </g>

  <!-- 意识层 -->
  <g transform="translate(50, 280)">
    <rect x="0" y="0" width="1100" height="130" rx="12" fill="#1e2644" stroke="#d4a84b" stroke-width="2" filter="url(#shadow3)"/>
    <text x="30" y="35" fill="#d4a84b" font-size="22" font-weight="bold">🧠 意识层 — 洞察力 (分析层)</text>
    <text x="30" y="60" fill="#8899bb" font-size="14">觉醒度 55% — 因果分析、矛盾检测</text>

    <g transform="translate(30, 80)">
      <rect x="0" y="0" width="500" height="40" rx="8" fill="#253258" stroke="#d4a84b"/>
      <text x="20" y="27" fill="#ffffff" font-size="14" font-weight="bold">FirstPrinciplesMind 第一性原理</text>
      <text x="280" y="27" fill="#8899bb" font-size="12">因果追踪 | 矛盾检测 | 根本原因分析</text>

      <rect x="520" y="0" width="500" height="40" rx="8" fill="#253258" stroke="#d4a84b"/>
      <text x="540" y="27" fill="#ffffff" font-size="14" font-weight="bold">CausalityTracker 因果追踪</text>
      <text x="760" y="27" fill="#8899bb" font-size="12">构建因果链 | 追踪根因</text>
    </g>
  </g>

  <!-- 末那识 -->
  <g transform="translate(50, 430)">
    <rect x="0" y="0" width="1100" height="150" rx="12" fill="#1e2644" stroke="#7b68c9" stroke-width="2" filter="url(#shadow3)"/>
    <text x="30" y="35" fill="#7b68c9" font-size="22" font-weight="bold">⚙️ 末那识 — 自我执着 (决策层)</text>
    <text x="30" y="60" fill="#8899bb" font-size="14">觉醒度 75% — 顺应决策、策略进化、机会发现</text>

    <g transform="translate(30, 80)">
      <rect x="0" y="0" width="340" height="55" rx="8" fill="#253258" stroke="#7b68c9"/>
      <text x="170" y="25" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">AdaptiveManas 顺应型末那识</text>
      <text x="170" y="43" text-anchor="middle" fill="#8899bb" font-size="11">根据市场状态调整决策</text>

      <rect x="360" y="0" width="340" height="55" rx="8" fill="#253258" stroke="#7b68c9"/>
      <text x="530" y="25" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">MetaEvolution 元进化</text>
      <text x="530" y="43" text-anchor="middle" fill="#8899bb" font-size="11">遗传算法 | 策略生成 | 模板库</text>

      <rect x="720" y="0" width="340" height="55" rx="8" fill="#253258" stroke="#7b68c9"/>
      <text x="890" y="25" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">OpportunityEngine 机会发现</text>
      <text x="890" y="43" text-anchor="middle" fill="#8899bb" font-size="11">识别交易机会 | 模式匹配</text>
    </g>
  </g>

  <!-- 阿赖耶识 -->
  <g transform="translate(50, 600)">
    <rect x="0" y="0" width="1100" height="130" rx="12" fill="#1e2644" stroke="#c75b7a" stroke-width="2" filter="url(#shadow3)"/>
    <text x="30" y="35" fill="#c75b7a" font-size="22" font-weight="bold">💎 阿赖耶识 — 藏识 (记忆层)</text>
    <text x="30" y="60" fill="#8899bb" font-size="14">觉醒度 80% — 跨市场记忆、模式归档、顿悟机制</text>

    <g transform="translate(30, 80)">
      <rect x="0" y="0" width="340" height="40" rx="8" fill="#253258" stroke="#c75b7a"/>
      <text x="20" y="27" fill="#ffffff" font-size="14" font-weight="bold">AwakenedAlaya 觉醒阿赖耶识</text>

      <rect x="360" y="0" width="340" height="40" rx="8" fill="#253258" stroke="#c75b7a"/>
      <text x="530" y="27" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">CrossMarketMemory 跨市场记忆</text>

      <rect x="720" y="0" width="340" height="40" rx="8" fill="#253258" stroke="#c75b7a"/>
      <text x="890" y="27" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">PatternArchive 模式归档</text>
    </g>
  </g>

  <!-- 觉醒路径 -->
  <g transform="translate(50, 750)">
    <rect x="0" y="0" width="1100" height="40" rx="8" fill="#2a3158"/>
    <text x="550" y="28" text-anchor="middle" fill="#ffffff" font-size="14">觉醒路径：感知(五识) → 分析(意识) → 决策(末那识) → 记忆(阿赖耶识)</text>
  </g>

  <text x="1150" y="785" text-anchor="end" fill="#556688" font-size="12">Naja Awakening System — 2026-03-31</text>
</svg>
