    <text x="317" y="50" text-anchor="middle" fill="#8899bb" font-size="10">自动调优</text>
    <text x="317" y="68" text-anchor="middle" fill="#aabbcc" font-size="9">修理工</text>

    <rect x="390" y="0" width="115" height="80" rx="8" fill="#253258"/>
    <text x="447" y="30" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">LLMController</text>
    <text x="447" y="50" text-anchor="middle" fill="#8899bb" font-size="10">LLM控制</text>
    <text x="447" y="68" text-anchor="middle" fill="#aabbcc" font-size="9">智囊团</text>

    <rect x="520" y="0" width="115" height="80" rx="8" fill="#253258"/>
    <text x="577" y="30" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">StreamSkill</text>
    <text x="577" y="50" text-anchor="middle" fill="#8899bb" font-size="10">流式Skill</text>
    <text x="577" y="68" text-anchor="middle" fill="#aabbcc" font-size="9">技能框架</text>
