    <rect x="120" y="5" width="120" height="28" rx="5" fill="#4a90d9"/>
    <text x="180" y="25" text-anchor="middle" fill="#fff" font-size="12">情报层</text>
    <rect x="250" y="5" width="120" height="28" rx="5" fill="#5ba881"/>
    <text x="310" y="25" text-anchor="middle" fill="#fff" font-size="12">侦察层</text>
    <rect x="380" y="5" width="120" height="28" rx="5" fill="#d4a84b"/>
    <text x="440" y="25" text-anchor="middle" fill="#fff" font-size="12">分析层</text>
    <rect x="510" y="5" width="120" height="28" rx="5" fill="#c75b7a"/>
    <text x="570" y="25" text-anchor="middle" fill="#fff" font-size="12">决策层</text>
    <rect x="640" y="5" width="120" height="28" rx="5" fill="#7b68c9"/>
    <text x="700" y="25" text-anchor="middle" fill="#fff" font-size="12">执行层</text>
    <text x="800" y="25" fill="#8899bb" font-size="14">回答：数据从哪来？→外面发生了什么？→市场讲什么？→买还是卖？→怎么执行？</text>
