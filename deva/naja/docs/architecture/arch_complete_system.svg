<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750">
  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <linearGradient id="layerBg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe"/>
      <stop offset="100%" style="stop-color:#bfdbfe"/>
    </linearGradient>
    <linearGradient id="layerBg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dcfce7"/>
      <stop offset="100%" style="stop-color:#bbf7d0"/>
    </linearGradient>
    <linearGradient id="layerBg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="750" fill="#f8fafc"/>

  <!-- Title -->
  <text x="500" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">Naja 完整系统架构</text>
  <text x="500" y="48" text-anchor="middle" font-size="12" fill="#64748b">感知层 → 认知层 → 决策层 → 交易执行</text>

  <!-- Layer 1: 外部世界 -->
  <rect x="350" y="65" width="300" height="45" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="500" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">🌐 外部世界</text>
  <text x="500" y="100" text-anchor="middle" font-size="10" fill="#b45309">新闻 · 行情 · 舆情 · 宏观</text>

  <line x1="500" y1="110" x2="500" y2="135" stroke="#666" stroke-width="2" marker-end="url(#arrow4)"/>

  <!-- Layer 2: Radar 感知层 -->
  <rect x="280" y="140" width="440" height="80" rx="10" fill="url(#layerBg1)" stroke="#3b82f6" stroke-width="2"/>
  <text x="500" y="162" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">📡 Radar 感知层</text>

  <rect x="295" y="175" width="120" height="35" rx="5" fill="white" stroke="#60a5fa" stroke-width="1"/>
  <text x="355" y="193" text-anchor="middle" font-size="9" fill="#2563eb">NewsFetcher</text>
  <text x="355" y="205" text-anchor="middle" font-size="8" fill="#93c5fd">新闻抓取</text>

  <rect x="425" y="175" width="140" height="35" rx="5" fill="white" stroke="#60a5fa" stroke-width="1"/>
  <text x="495" y="193" text-anchor="middle" font-size="9" fill="#2563eb">GlobalMarketScanner</text>
  <text x="495" y="205" text-anchor="middle" font-size="8" fill="#93c5fd">全球市场</text>

  <rect x="575" y="175" width="130" height="35" rx="5" fill="white" stroke="#60a5fa" stroke-width="1"/>
  <text x="640" y="193" text-anchor="middle" font-size="9" fill="#2563eb">SignalAnomalyDetector</text>
  <text x="640" y="205" text-anchor="middle" font-size="8" fill="#93c5fd">异常检测</text>

  <line x1="500" y1="220" x2="500" y2="245" stroke="#666" stroke-width="2" marker-end="url(#arrow4)"/>

  <!-- Layer 3: Cognition 认知层 -->
  <rect x="200" y="250" width="600" height="220" rx="10" fill="url(#layerBg2)" stroke="#22c55e" stroke-width="2"/>
  <text x="500" y="272" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">🧠 Cognition 认知层</text>

  <!-- TextSignalBus -->
  <rect x="220" y="290" width="180" height="70" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="310" y="312" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">TextSignalBus</text>
  <text x="310" y="328" text-anchor="middle" font-size="9" fill="#15803d">注意力阈值过滤</text>
  <text x="310" y="342" text-anchor="middle" font-size="8" fill="#22c55e">min_attention: 0.4~0.7</text>
  <text x="310" y="354" text-anchor="middle" font-size="8" fill="#86efac">发布/订阅机制</text>

  <!-- TextProcessingPipeline -->
  <rect x="415" y="290" width="180" height="70" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="505" y="312" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">TextProcessingPipeline</text>
  <text x="505" y="328" text-anchor="middle" font-size="9" fill="#15803d">关键词提取</text>
  <text x="505" y="342" text-anchor="middle" font-size="8" fill="#22c55e">AttentionTextRouter</text>
  <text x="505" y="354" text-anchor="middle" font-size="8" fill="#86efac">注意力评分</text>

  <!-- 天-地-人 -->
  <rect x="610" y="290" width="170" height="70" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="695" y="312" text-anchor="middle" font-size="11" font-weight="bold" fill="#9d174d">天-地-人框架</text>
  <text x="695" y="328" text-anchor="middle" font-size="9" fill="#be185d">叙事追踪</text>
  <text x="695" y="342" text-anchor="middle" font-size="8" fill="#f472b6">SectorNarrative</text>
  <text x="695" y="354" text-anchor="middle" font-size="8" fill="#f472b6">TimingNarrative</text>

  <!-- Narrative Components -->
  <rect x="220" y="375" width="130" height="40" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
  <text x="285" y="393" text-anchor="middle" font-size="9" font-weight="bold" fill="#854d0e">🌍 地</text>
  <text x="285" y="407" text-anchor="middle" font-size="8" fill="#a16207">SectorNarrative</text>

  <rect x="360" y="375" width="130" height="40" rx="5" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
  <text x="425" y="393" text-anchor="middle" font-size="9" font-weight="bold" fill="#9d174d">☁️ 天</text>
  <text x="425" y="407" text-anchor="middle" font-size="8" fill="#be185d">TimingNarrative</text>

  <rect x="500" y="375" width="130" height="40" rx="5" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="565" y="393" text-anchor="middle" font-size="9" font-weight="bold" fill="#3730a3">🔗</text>
  <text x="565" y="407" text-anchor="middle" font-size="8" fill="#4f46e5">SupplyChainLinker</text>

  <rect x="640" y="375" width="130" height="40" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="705" y="393" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">💰</text>
  <text x="705" y="407" text-anchor="middle" font-size="8" fill="#15803d">LiquidityCognition</text>

  <!-- CognitiveSignalBus -->
  <rect x="380" y="425" width="180" height="35" rx="5" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="470" y="442" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">CognitiveSignalBus</text>
  <text x="470" y="454" text-anchor="middle" font-size="8" fill="#15803d">认知信号总线</text>

  <line x1="500" y1="470" x2="500" y2="495" stroke="#666" stroke-width="2" marker-end="url(#arrow4)"/>

  <!-- Layer 4: ManasEngine 决策层 -->
  <rect x="200" y="500" width="600" height="150" rx="10" fill="url(#layerBg3)" stroke="#f59e0b" stroke-width="2"/>
  <text x="500" y="522" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">🧠 ManasEngine 决策层（人）</text>

  <!-- 四引擎 -->
  <rect x="220" y="540" width="135" height="50" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="287" y="558" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">TimingEngine</text>
  <text x="287" y="572" text-anchor="middle" font-size="8" fill="#15803d">时机节律 · 天</text>
  <text x="287" y="584" text-anchor="middle" font-size="7" fill="#22c55e">→ timing_score</text>

  <rect x="365" y="540" width="135" height="50" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="432" y="558" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">RegimeEngine</text>
  <text x="432" y="572" text-anchor="middle" font-size="8" fill="#15803d">环境感 · 地</text>
  <text x="432" y="584" text-anchor="middle" font-size="7" fill="#22c55e">→ regime_score</text>

  <rect x="510" y="540" width="135" height="50" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="577" y="558" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">ConfidenceEngine</text>
  <text x="577" y="572" text-anchor="middle" font-size="8" fill="#15803d">自信 · 策略适配</text>
  <text x="577" y="584" text-anchor="middle" font-size="7" fill="#22c55e">→ confidence</text>

  <rect x="655" y="540" width="135" height="50" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="722" y="558" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">RiskEngine</text>
  <text x="722" y="572" text-anchor="middle" font-size="8" fill="#15803d">风险 · 客观</text>
  <text x="722" y="584" text-anchor="middle" font-size="7" fill="#22c55e">→ temperature</text>

  <!-- MetaManas -->
  <rect x="420" y="600" width="160" height="40" rx="6" fill="#fecaca" stroke="#dc2626" stroke-width="1.5"/>
  <text x="500" y="618" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b">MetaManas</text>
  <text x="500" y="632" text-anchor="middle" font-size="8" fill="#b91c1c">偏差纠偏 · bias_correction</text>

  <line x1="500" y1="665" x2="500" y2="680" stroke="#666" stroke-width="1" marker-end="url(#arrow4)"/>

  <!-- Layer 5: Trading -->
  <rect x="350" y="685" width="300" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="500" y="705" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">📊 TradingCenter</text>
  <text x="500" y="722" text-anchor="middle" font-size="10" fill="#b45309">决策融合 · 交易执行</text>

  <!-- Connection arrows from Cognition to Manas -->
  <line x1="500" y1="375" x2="500" y2="500" stroke="#666" stroke-width="1" stroke-dasharray="4" opacity="0.5"/>

  <!-- Legend -->
  <rect x="30" y="680" width="280" height="60" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="45" y="698" font-size="10" font-weight="bold" fill="#475569">架构层次</text>
  <rect x="45" y="706" width="10" height="10" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="60" y="715" font-size="9" fill="#64748b">外部世界</text>
  <rect x="120" y="706" width="10" height="10" fill="#bfdbfe" stroke="#3b82f6"/>
  <text x="135" y="715" font-size="9" fill="#64748b">Radar 感知层</text>
  <rect x="195" y="706" width="10" height="10" fill="#bbf7d0" stroke="#22c55e"/>
  <text x="210" y="715" font-size="9" fill="#64748b">Cognition</text>
  <rect x="45" y="722" width="10" height="10" fill="#fde68a" stroke="#f59e0b"/>
  <text x="60" y="731" font-size="9" fill="#64748b">ManasEngine</text>
</svg>