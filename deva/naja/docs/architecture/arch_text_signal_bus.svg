<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <rect width="900" height="400" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">TextSignalBus 数据流</text>
  <text x="450" y="48" text-anchor="middle" font-size="11" fill="#64748b">注意力阈值过滤机制 · 多消费者订阅</text>

  <!-- Radar/News -->
  <rect x="50" y="80" width="180" height="60" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Radar</text>
  <text x="140" y="115" text-anchor="middle" font-size="9" fill="#3b82f6">NewsFetcher</text>
  <text x="140" y="130" text-anchor="middle" font-size="9" fill="#93c5fd">GlobalMarketScanner</text>

  <line x1="230" y1="110" x2="270" y2="110" stroke="#666" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- TextProcessingPipeline -->
  <rect x="280" y="80" width="180" height="60" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="370" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#4338ca">TextProcessingPipeline</text>
  <text x="370" y="115" text-anchor="middle" font-size="9" fill="#6366f1">关键词提取</text>
  <text x="370" y="130" text-anchor="middle" font-size="9" fill="#a5b4fc">AttentionTextRouter</text>

  <line x1="460" y1="110" x2="500" y2="110" stroke="#666" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- TextSignalBus -->
  <rect x="510" y="65" width="180" height="90" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="600" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#9d174d">TextSignalBus</text>
  <text x="600" y="105" text-anchor="middle" font-size="9" fill="#be185d">注意力阈值过滤</text>
  <text x="600" y="120" text-anchor="middle" font-size="8" fill="#f472b6">• 高注意力(0.7+) → 重大新闻</text>
  <text x="600" y="133" text-anchor="middle" font-size="8" fill="#f472b6">• 低注意力(0.4) → 风险事件</text>
  <text x="600" y="146" text-anchor="middle" font-size="8" fill="#f472b6">• 只转发达阈值的信号</text>

  <!-- Subscribers -->
  <line x1="690" y1="110" x2="730" y2="110" stroke="#666" stroke-width="2" marker-end="url(#arrow3)"/>

  <rect x="740" y="65" width="140" height="280" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="810" y="88" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">订阅者</text>

  <!-- SectorNarrative -->
  <rect x="752" y="100" width="116" height="45" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="810" y="117" text-anchor="middle" font-size="9" font-weight="bold" fill="#854d0e">🌍 地</text>
  <text x="810" y="130" text-anchor="middle" font-size="8" fill="#a16207">SectorNarrative</text>
  <text x="810" y="140" text-anchor="middle" font-size="7" fill="#ca8a04">min_att=0.7</text>

  <!-- TimingNarrative -->
  <rect x="752" y="155" width="116" height="45" rx="5" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="810" y="172" text-anchor="middle" font-size="9" font-weight="bold" fill="#9d174d">☁️ 天</text>
  <text x="810" y="185" text-anchor="middle" font-size="8" fill="#be185d">TimingNarrative</text>
  <text x="810" y="195" text-anchor="middle" font-size="7" fill="#f472b6">min_att=0.7</text>

  <!-- SupplyChainLinker -->
  <rect x="752" y="210" width="116" height="45" rx="5" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="810" y="227" text-anchor="middle" font-size="9" font-weight="bold" fill="#3730a3">🔗</text>
  <text x="810" y="240" text-anchor="middle" font-size="8" fill="#4f46e5">SupplyChainLinker</text>
  <text x="810" y="250" text-anchor="middle" font-size="7" fill="#818cf8">min_att=0.4</text>

  <!-- BanditHead -->
  <rect x="752" y="265" width="116" height="35" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="810" y="280" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">BanditHead</text>
  <text x="810" y="292" text-anchor="middle" font-size="7" fill="#15803d">min_att=0.5</text>

  <!-- AttentionTextItem -->
  <rect x="50" y="200" width="180" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="140" y="222" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">AttentionTextItem</text>
  <text x="140" y="245" text-anchor="middle" font-size="9" fill="#b45309">数据结构</text>
  <line x1="140" y1="255" x2="140" y2="265" stroke="#f59e0b" stroke-width="1"/>
  <text x="140" y="278" text-anchor="middle" font-size="8" fill="#b45309">• title / content</text>
  <text x="140" y="292" text-anchor="middle" font-size="8" fill="#b45309">• attention_score</text>
  <text x="140" y="306" text-anchor="middle" font-size="8" fill="#b45309">• keywords[]</text>
  <text x="140" y="320" text-anchor="middle" font-size="8" fill="#b45309">• source / timestamp</text>

  <line x1="230" y1="270" x2="280" y2="200" stroke="#666" stroke-width="1" stroke-dasharray="4"/>
  <line x1="280" y1="270" x2="280" y2="140" stroke="#666" stroke-width="1" stroke-dasharray="4"/>

  <!-- Legend -->
  <rect x="50" y="365" width="800" height="28" rx="4" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="70" y="382" font-size="10" fill="#64748b">说明：</text>
  <text x="120" y="382" font-size="10" fill="#64748b">TextSignalBus 根据注意力阈值过滤信号，只转发高注意力(≥min_attention)的信号给对应订阅者</text>
</svg>