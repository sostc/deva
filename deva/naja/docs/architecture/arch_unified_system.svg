<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 950">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <linearGradient id="layerRadar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe"/>
      <stop offset="100%" style="stop-color:#bfdbfe"/>
    </linearGradient>
    <linearGradient id="layerCognition" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dcfce7"/>
      <stop offset="100%" style="stop-color:#bbf7d0"/>
    </linearGradient>
    <linearGradient id="layerManas" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1400" height="950" fill="#f8fafc"/>

  <!-- Title -->
  <text x="700" y="35" text-anchor="middle" font-size="24" font-weight="bold" fill="#1e293b">Naja 完整认知系统架构</text>
  <text x="700" y="58" text-anchor="middle" font-size="13" fill="#64748b">感知层 → 认知层 → 决策层 → 交易执行 | 天-地-人框架</text>

  <!-- Layer 1: 外部世界 -->
  <rect x="500" y="80" width="400" height="50" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="700" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">🌐 外部世界</text>
  <text x="700" y="118" text-anchor="middle" font-size="11" fill="#b45309">新闻 · 行情 · 舆情 · 宏观数据</text>

  <line x1="700" y1="130" x2="700" y2="165" stroke="#666" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Layer 2: Radar 感知层 -->
  <rect x="320" y="170" width="760" height="90" rx="12" fill="url(#layerRadar)" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="700" y="195" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e40af">📡 Radar 感知层</text>
  <text x="700" y="215" text-anchor="middle" font-size="11" fill="#3b82f6">发现信号 · 异常检测 · 数据清洗</text>

  <rect x="340" y="230" width="150" height="25" rx="4" fill="white" stroke="#60a5fa" stroke-width="1"/>
  <text x="415" y="247" text-anchor="middle" font-size="10" fill="#2563eb">NewsFetcher</text>

  <rect x="510" y="230" width="180" height="25" rx="4" fill="white" stroke="#60a5fa" stroke-width="1"/>
  <text x="600" y="247" text-anchor="middle" font-size="10" fill="#2563eb">GlobalMarketScanner</text>

  <rect x="710" y="230" width="190" height="25" rx="4" fill="white" stroke="#60a5fa" stroke-width="1"/>
  <text x="805" y="247" text-anchor="middle" font-size="10" fill="#2563eb">SignalAnomalyDetector</text>

  <rect x="930" y="230" width="135" height="25" rx="4" fill="white" stroke="#60a5fa" stroke-width="1"/>
  <text x="997" y="247" text-anchor="middle" font-size="10" fill="#2563eb">TradingClock</text>

  <line x1="700" y1="260" x2="700" y2="295" stroke="#666" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Layer 3: Cognition 认知层 -->
  <rect x="180" y="300" width="1040" height="260" rx="12" fill="url(#layerCognition)" stroke="#22c55e" stroke-width="2.5"/>
  <text x="700" y="325" text-anchor="middle" font-size="16" font-weight="bold" fill="#166534">🧠 Cognition 认知层</text>
  <text x="700" y="345" text-anchor="middle" font-size="11" fill="#22c55e">文本信号处理 · 叙事追踪 · 注意力阈值过滤</text>

  <!-- TextProcessingPipeline -->
  <rect x="200" y="360" width="220" height="80" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
  <text x="310" y="382" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">TextProcessingPipeline</text>
  <text x="310" y="400" text-anchor="middle" font-size="10" fill="#15803d">关键词提取 · 注意力评分</text>
  <text x="310" y="415" text-anchor="middle" font-size="9" fill="#22c55e">AttentionTextRouter</text>
  <text x="310" y="430" text-anchor="middle" font-size="8" fill="#86efac">→ AttentionTextItem</text>

  <!-- TextSignalBus -->
  <rect x="440" y="360" width="200" height="80" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="540" y="382" text-anchor="middle" font-size="12" font-weight="bold" fill="#9d174d">TextSignalBus</text>
  <text x="540" y="400" text-anchor="middle" font-size="10" fill="#be185d">注意力阈值过滤</text>
  <text x="540" y="415" text-anchor="middle" font-size="9" fill="#ec4899">min_att: 0.4 ~ 0.7</text>
  <text x="540" y="430" text-anchor="middle" font-size="8" fill="#f472b6">发布/订阅机制</text>

  <!-- 天-地-人 框架 -->
  <rect x="660" y="355" width="540" height="95" rx="8" fill="white" stroke="#16a34a" stroke-width="2"/>
  <text x="930" y="378" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">☁️ 天-地-人 叙事框架</text>

  <rect x="680" y="393" width="155" height="48" rx="5" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="757" y="413" text-anchor="middle" font-size="10" font-weight="bold" fill="#9d174d">☁️ 天</text>
  <text x="757" y="428" text-anchor="middle" font-size="9" fill="#be185d">TimingNarrative</text>
  <text x="757" y="440" text-anchor="middle" font-size="8" fill="#f472b6">时机 · 现在能动吗</text>

  <rect x="850" y="393" width="155" height="48" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="927" y="413" text-anchor="middle" font-size="10" font-weight="bold" fill="#854d0e">🌍 地</text>
  <text x="927" y="428" text-anchor="middle" font-size="9" fill="#a16207">SectorNarrative</text>
  <text x="927" y="440" text-anchor="middle" font-size="8" fill="#ca8a04">板块 · 关心什么</text>

  <rect x="1020" y="393" width="165" height="48" rx="5" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="1102" y="413" text-anchor="middle" font-size="10" font-weight="bold" fill="#3730a3">🔗 供应链</text>
  <text x="1102" y="428" text-anchor="middle" font-size="9" fill="#4f46e5">SupplyChainLinker</text>
  <text x="1102" y="440" text-anchor="middle" font-size="8" fill="#818cf8">风险感知</text>

  <!-- CognitiveSignalBus -->
  <rect x="200" y="455" width="200" height="40" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="300" y="475" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">CognitiveSignalBus</text>
  <text x="300" y="490" text-anchor="middle" font-size="9" fill="#15803d">认知信号总线</text>

  <!-- 其他认知模块 -->
  <rect x="420" y="455" width="130" height="40" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="485" y="475" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">LiquidityCognition</text>
  <text x="485" y="490" text-anchor="middle" font-size="8" fill="#15803d">流动性认知</text>

  <rect x="565" y="455" width="130" height="40" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="630" y="475" text-anchor="middle" font-size="9" font-weight="bold" fill="#9d174d">KeywordRegistry</text>
  <text x="630" y="490" text-anchor="middle" font-size="8" fill="#be185d">关键词注册</text>

  <rect x="710" y="455" width="150" height="40" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="785" y="475" text-anchor="middle" font-size="9" font-weight="bold" fill="#854d0e">NarrativeSupplyChainLinker</text>
  <text x="785" y="490" text-anchor="middle" font-size="8" fill="#a16207">叙事供应链</text>

  <line x1="700" y1="450" x2="700" y2="495" stroke="#666" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Layer 4: ManasEngine 决策层 -->
  <rect x="180" y="500" width="1040" height="220" rx="12" fill="url(#layerManas)" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="700" y="525" text-anchor="middle" font-size="16" font-weight="bold" fill="#92400e">🧠 ManasEngine 决策层（人）</text>
  <text x="700" y="545" text-anchor="middle" font-size="11" fill="#b45309">天-地-人框架中的「人」| 综合「天」+「地」+ 四引擎 + 观照层</text>

  <!-- 四引擎 + MetaManas -->
  <rect x="210" y="560" width="155" height="70" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
  <text x="287" y="582" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">TimingEngine</text>
  <text x="287" y="598" text-anchor="middle" font-size="9" fill="#15803d">时机节律 · 微观</text>
  <text x="287" y="612" text-anchor="middle" font-size="8" fill="#22c55e">→ timing_score ∈ [0,1]</text>
  <text x="287" y="624" text-anchor="middle" font-size="7" fill="#86efac">现在能不能动？</text>

  <rect x="380" y="560" width="155" height="70" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
  <text x="457" y="582" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">RegimeEngine</text>
  <text x="457" y="598" text-anchor="middle" font-size="9" fill="#15803d">环境感 · 宏观</text>
  <text x="457" y="612" text-anchor="middle" font-size="8" fill="#22c55e">→ regime_score ∈ [-1,1]</text>
  <text x="457" y="624" text-anchor="middle" font-size="7" fill="#86efac">大方向顺不顺？</text>

  <rect x="550" y="560" width="155" height="70" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
  <text x="627" y="582" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">ConfidenceEngine</text>
  <text x="627" y="598" text-anchor="middle" font-size="9" fill="#15803d">自信 · 策略适配</text>
  <text x="627" y="612" text-anchor="middle" font-size="8" fill="#22c55e">→ confidence ∈ [0,1.5]</text>
  <text x="627" y="624" text-anchor="middle" font-size="7" fill="#86efac">策略还管用吗？</text>

  <rect x="720" y="560" width="155" height="70" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
  <text x="797" y="582" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">RiskEngine</text>
  <text x="797" y="598" text-anchor="middle" font-size="9" fill="#15803d">风险 · 客观</text>
  <text x="797" y="612" text-anchor="middle" font-size="8" fill="#22c55e">→ temperature ∈ (0,2]</text>
  <text x="797" y="624" text-anchor="middle" font-size="7" fill="#86efac">市场能杀我多少？</text>

  <!-- MetaManas -->
  <rect x="890" y="560" width="155" height="70" rx="8" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
  <text x="967" y="582" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">MetaManas</text>
  <text x="967" y="598" text-anchor="middle" font-size="9" fill="#b91c1c">观照层 · 主观</text>
  <text x="967" y="612" text-anchor="middle" font-size="8" fill="#ef4444">→ bias_state</text>
  <text x="967" y="624" text-anchor="middle" font-size="7" fill="#fca5a5">我自己会作死吗？</text>

  <!-- ManasScore 输出 -->
  <rect x="480" y="645" width="220" height="55" rx="8" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
  <text x="590" y="668" text-anchor="middle" font-size="12" font-weight="bold" fill="#9a3412">ManasScore 统一输出</text>
  <text x="590" y="685" text-anchor="middle" font-size="10" fill="#ea580c">manas_score ∈ [0,1]</text>

  <!-- 公式 -->
  <rect x="720" y="645" width="280" height="55" rx="6" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="860" y="665" text-anchor="middle" font-size="9" font-weight="bold" fill="#92400e">计算公式</text>
  <text x="860" y="682" text-anchor="middle" font-size="9" fill="#b45309">manas = 0.4×timing + 0.3×regime + 0.3×confidence</text>

  <line x1="700" y1="630" x2="700" y2="645" stroke="#666" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Layer 5: TradingCenter -->
  <rect x="350" y="740" width="700" height="100" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="700" y="768" text-anchor="middle" font-size="16" font-weight="bold" fill="#92400e">📊 TradingCenter 交易中枢</text>
  <text x="700" y="788" text-anchor="middle" font-size="11" fill="#b45309">协调中枢：数据分发 · 快速决策 · 慢思考融合 · 决策融合 · 交易执行</text>

  <rect x="380" y="800" width="120" height="30" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="440" y="819" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">AttentionOS</text>

  <rect x="520" y="800" width="140" height="30" rx="4" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="590" y="819" text-anchor="middle" font-size="10" font-weight="bold" fill="#9d174d">FirstPrinciplesMind</text>

  <rect x="680" y="800" width="120" height="30" rx="4" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="740" y="819" text-anchor="middle" font-size="10" font-weight="bold" fill="#854d0e">AwakenedAlaya</text>

  <rect x="820" y="800" width="110" height="30" rx="4" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="875" y="819" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">ManasEngine</text>

  <!-- 输出 -->
  <rect x="580" y="845" width="240" height="30" rx="6" fill="white" stroke="#22c55e" stroke-width="1.5"/>
  <text x="700" y="865" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">→ FusionResult | action_type | position</text>

  <!-- 天-地-人 感知箭头 -->
  <line x1="810" y1="420" x2="875" y2="560" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="5" marker-end="url(#arrowRed)"/>
  <line x1="930" y1="420" x2="875" y2="560" stroke="#eab308" stroke-width="1.5" stroke-dasharray="5" marker-end="url(#arrowRed)"/>

  <!-- 视角总结表格 -->
  <rect x="1070" y="560" width="150" height="195" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="1145" y="580" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569">各引擎视角</text>

  <rect x="1082" y="590" width="126" height="20" rx="3" fill="#bbf7d0"/>
  <text x="1145" y="604" text-anchor="middle" font-size="8" fill="#166534">Timing 微</text>

  <rect x="1082" y="615" width="126" height="20" rx="3" fill="#bbf7d0"/>
  <text x="1145" y="629" text-anchor="middle" font-size="8" fill="#166534">Regime 宏</text>

  <rect x="1082" y="640" width="126" height="20" rx="3" fill="#bbf7d0"/>
  <text x="1145" y="654" text-anchor="middle" font-size="8" fill="#166534">Conf 策略</text>

  <rect x="1082" y="665" width="126" height="20" rx="3" fill="#bbf7d0"/>
  <text x="1145" y="679" text-anchor="middle" font-size="8" fill="#166534">Risk 客观</text>

  <rect x="1082" y="690" width="126" height="20" rx="3" fill="#fecaca"/>
  <text x="1145" y="704" text-anchor="middle" font-size="8" fill="#991b1b">Meta 主观</text>

  <rect x="1082" y="715" width="126" height="20" rx="3" fill="#fed7aa"/>
  <text x="1145" y="729" text-anchor="middle" font-size="8" fill="#9a3412">Score 合一</text>

  <!-- Legend -->
  <rect x="30" y="760" width="280" height="160" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="45" y="782" font-size="11" font-weight="bold" fill="#475569">图例</text>

  <rect x="45" y="795" width="16" height="16" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="68" y="807" font-size="10" fill="#64748b">外部世界</text>

  <rect x="45" y="816" width="16" height="16" fill="url(#layerRadar)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="68" y="828" font-size="10" fill="#64748b">Radar 感知层</text>

  <rect x="45" y="837" width="16" height="16" fill="url(#layerCognition)" stroke="#22c55e" stroke-width="1.5"/>
  <text x="68" y="849" font-size="10" fill="#64748b">Cognition 认知层</text>

  <rect x="45" y="858" width="16" height="16" fill="url(#layerManas)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="68" y="870" font-size="10" fill="#64748b">ManasEngine 决策层</text>

  <line x1="45" y1="890" x2="75" y2="890" stroke="#666" stroke-width="1.5" stroke-dasharray="5"/>
  <text x="82" y="894" font-size="9" fill="#64748b">天-地感知</text>

  <line x1="45" y1="906" x2="75" y2="906" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5" marker-end="url(#arrowRed)"/>
  <text x="82" y="910" font-size="9" fill="#64748b">Narrative感知</text>
</svg>