<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 520">
  <defs>
    <marker id="arrow5" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="850" height="520" fill="#f8fafc"/>

  <!-- Title -->
  <text x="425" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">TradingCenter 与注意力系统</text>
  <text x="425" y="50" text-anchor="middle" font-size="11" fill="#64748b">协调中枢：数据分发 → 注意力计算 → 决策融合</text>

  <!-- TradingCenter -->
  <rect x="280" y="75" width="290" height="380" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="425" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#92400e">TradingCenter 交易中枢</text>
  <text x="425" y="118" text-anchor="middle" font-size="10" fill="#b45309">Naja系统的协调中枢</text>

  <!-- Responsibilities -->
  <rect x="295" y="135" width="260" height="95" rx="6" fill="white" stroke="#eab308" stroke-width="1"/>
  <text x="425" y="152" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350f">核心职责</text>
  <text x="310" y="170" font-size="9" fill="#92400e">• 数据协调 - 接收市场数据，分发给各模块</text>
  <text x="310" y="185" font-size="9" fill="#92400e">• 快速决策 - 通过 AttentionOS.kernel</text>
  <text x="310" y="200" font-size="9" fill="#92400e">• 慢思考融合 - 调用 FirstPrinciplesMind</text>
  <text x="310" y="215" font-size="9" fill="#92400e">• 决策融合 - 融合各模块输出生成最终决策</text>

  <!-- FusionResult -->
  <rect x="295" y="240" width="260" height="70" rx="6" fill="#fde68a" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="425" y="260" text-anchor="middle" font-size="11" font-weight="bold" fill="#78350f">FusionResult 决策融合</text>
  <text x="425" y="278" text-anchor="middle" font-size="9" fill="#92400e">final_position · action_type</text>
  <text x="425" y="292" text-anchor="middle" font-size="9" fill="#92400e">should_act · reasoning</text>
  <text x="425" y="306" text-anchor="middle" font-size="9" fill="#a16207">confidence · risk_warnings</text>

  <!-- Internal Modules -->
  <text x="425" y="330" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350f">内部模块</text>

  <rect x="300" y="345" width="110" height="45" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="355" y="365" text-anchor="middle" font-size="9" font-weight="bold" fill="#1e40af">AttentionOS</text>
  <text x="355" y="380" text-anchor="middle" font-size="8" fill="#3b82f6">快速决策</text>

  <rect x="420" y="345" width="130" height="45" rx="5" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="485" y="365" text-anchor="middle" font-size="9" font-weight="bold" fill="#9d174d">FirstPrinciplesMind</text>
  <text x="485" y="380" text-anchor="middle" font-size="8" fill="#ec4899">因果推理</text>

  <rect x="300" y="400" width="110" height="45" rx="5" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="355" y="420" text-anchor="middle" font-size="9" font-weight="bold" fill="#854d0e">AwakenedAlaya</text>
  <text x="355" y="435" text-anchor="middle" font-size="8" fill="#ca8a04">模式匹配</text>

  <!-- ManasEngine -->
  <rect x="420" y="400" width="130" height="45" rx="5" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="485" y="420" text-anchor="middle" font-size="9" font-weight="bold" fill="#92400e">ManasEngine</text>
  <text x="485" y="435" text-anchor="middle" font-size="8" fill="#b45309">决策中枢</text>

  <!-- AttentionOS Detail (Right) -->
  <rect x="610" y="120" width="210" height="150" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="715" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">AttentionOS</text>
  <text x="715" y="162" text-anchor="middle" font-size="10" fill="#3b82f6">注意力操作系统</text>

  <rect x="625" y="175" width="180" height="85" rx="6" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="715" y="192" text-anchor="middle" font-size="9" font-weight="bold" fill="#2563eb">OS 应用层</text>
  <text x="715" y="207" text-anchor="middle" font-size="8" fill="#3b82f6">MarketScheduler · StrategyAllocator</text>
  <text x="715" y="220" text-anchor="middle" font-size="8" fill="#3b82f6">FrequencyController</text>
  <text x="715" y="238" text-anchor="middle" font-size="9" font-weight="bold" fill="#2563eb">Kernel 内核</text>
  <text x="715" y="252" text-anchor="middle" font-size="8" fill="#3b82f6">QKV计算 · ManasEngine · Encoder</text>

  <!-- ManasEngine Detail (Right) -->
  <rect x="610" y="285" width="210" height="170" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="715" y="310" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">ManasEngine</text>
  <text x="715" y="327" text-anchor="middle" font-size="10" fill="#b45309">天-地-人（人）</text>

  <rect x="625" y="340" width="180" height="105" rx="6" fill="white" stroke="#fcd34d" stroke-width="1"/>
  <text x="715" y="356" text-anchor="middle" font-size="9" font-weight="bold" fill="#92400e">四引擎 + 一观照</text>

  <text x="715" y="373" text-anchor="middle" font-size="8" fill="#16a34a">TimingEngine → 时机</text>
  <text x="715" y="386" text-anchor="middle" font-size="8" fill="#16a34a">RegimeEngine → 环境</text>
  <text x="715" y="399" text-anchor="middle" font-size="8" fill="#16a34a">ConfidenceEngine → 自信</text>
  <text x="715" y="412" text-anchor="middle" font-size="8" fill="#16a34a">RiskEngine → 风险</text>
  <text x="715" y="425" text-anchor="middle" font-size="8" fill="#dc2626">MetaManas → 偏差</text>

  <text x="715" y="442" text-anchor="middle" font-size="9" font-weight="bold" fill="#ea580c">→ manas_score</text>

  <!-- Data Flow -->
  <line x1="570" y1="195" x2="610" y2="195" stroke="#666" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="590" y="188" text-anchor="middle" font-size="8" fill="#64748b">调用</text>

  <line x1="570" y1="370" x2="610" y2="360" stroke="#666" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="595" y="358" text-anchor="middle" font-size="8" fill="#64748b">感知</text>

  <!-- Arrows to internal modules -->
  <line x1="355" y1="120" x2="355" y2="345" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="3" marker-end="url(#arrow5)"/>
  <line x1="485" y1="120" x2="485" y2="345" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="3" marker-end="url(#arrow5)"/>
  <line x1="355" y1="400" x2="355" y2="400" stroke="#eab308" stroke-width="1.5" stroke-dasharray="3" marker-end="url(#arrow5)"/>
  <line x1="485" y1="400" x2="485" y2="400" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3" marker-end="url(#arrow5)"/>

  <!-- Legend -->
  <rect x="30" y="440" width="220" height="70" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="45" y="458" font-size="10" font-weight="bold" fill="#475569">数据流向</text>
  <line x1="45" y1="475" x2="75" y2="475" stroke="#3b82f6" stroke-width="2"/>
  <text x="80" y="478" font-size="9" fill="#64748b">快速决策路径</text>
  <line x1="45" y1="495" x2="75" y2="495" stroke="#ec4899" stroke-width="2" stroke-dasharray="3"/>
  <text x="80" y="498" font-size="9" fill="#64748b">慢思考路径</text>
</svg>