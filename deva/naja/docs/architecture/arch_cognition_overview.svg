<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="650" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">Naja 认知系统架构</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#64748b">数据流：从外部世界到交易决策</text>

  <!-- Layer 1: External World -->
  <rect x="320" y="80" width="260" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">外部世界</text>
  <text x="450" y="112" text-anchor="middle" font-size="11" fill="#b45309">新闻 · 行情 · 舆情 · 宏观数据</text>

  <line x1="450" y1="130" x2="450" y2="155" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 2: Radar -->
  <rect x="280" y="160" width="340" height="70" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="180" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Radar 感知层</text>
  <text x="450" y="198" text-anchor="middle" font-size="11" fill="#3b82f6">发现信号 · 异常检测 · 数据清洗</text>
  <text x="450" y="215" text-anchor="middle" font-size="10" fill="#93c5fd">NewsFetcher · GlobalMarketScanner · SignalAnomalyDetector</text>

  <line x1="450" y1="230" x2="450" y2="255" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 3: Cognition -->
  <rect x="220" y="260" width="460" height="180" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="282" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">Cognition 认知层</text>

  <!-- TextSignalBus -->
  <rect x="240" y="295" width="160" height="60" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="320" y="318" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">TextSignalBus</text>
  <text x="320" y="335" text-anchor="middle" font-size="10" fill="#15803d">注意力阈值过滤</text>
  <text x="320" y="348" text-anchor="middle" font-size="9" fill="#86efac">min_attention=0.4~0.7</text>

  <!-- Processing Pipeline -->
  <rect x="420" y="295" width="240" height="60" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="540" y="318" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">TextProcessingPipeline</text>
  <text x="540" y="335" text-anchor="middle" font-size="10" fill="#15803d">关键词提取 · 注意力评分</text>
  <text x="540" y="348" text-anchor="middle" font-size="9" fill="#86efac">AttentionTextRouter</text>

  <!-- 天 -->
  <rect x="240" y="370" width="130" height="55" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="305" y="390" text-anchor="middle" font-size="11" font-weight="bold" fill="#9d174d">☁️ 天 TimingNarrative</text>
  <text x="305" y="408" text-anchor="middle" font-size="10" fill="#be185d">时机叙事 · 是否该动</text>

  <!-- 地 -->
  <rect x="385" y="370" width="130" height="55" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="450" y="390" text-anchor="middle" font-size="11" font-weight="bold" fill="#854d0e">🌍 地 SectorNarrative</text>
  <text x="450" y="408" text-anchor="middle" font-size="10" fill="#a16207">板块叙事 · 关心什么</text>

  <!-- Supply Chain -->
  <rect x="530" y="370" width="130" height="55" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="595" y="390" text-anchor="middle" font-size="11" font-weight="bold" fill="#3730a3">🔗 SupplyChainLinker</text>
  <text x="595" y="408" text-anchor="middle" font-size="10" fill="#4f46e5">供应链风险感知</text>

  <line x1="450" y1="440" x2="450" y2="465" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ManasEngine -->
  <rect x="270" y="470" width="360" height="130" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="492" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">🧠 ManasEngine 决策层（人）</text>

  <!-- 4 engines + 1 meta -->
  <rect x="285" y="505" width="70" height="45" rx="4" fill="#fde68a" stroke="#ca8a04" stroke-width="1"/>
  <text x="320" y="523" text-anchor="middle" font-size="9" font-weight="bold" fill="#a16207">Timing</text>
  <text x="320" y="537" text-anchor="middle" font-size="8" fill="#a16207">时机</text>

  <rect x="365" y="505" width="70" height="45" rx="4" fill="#fde68a" stroke="#ca8a04" stroke-width="1"/>
  <text x="400" y="523" text-anchor="middle" font-size="9" font-weight="bold" fill="#a16207">Regime</text>
  <text x="400" y="537" text-anchor="middle" font-size="8" fill="#a16207">环境</text>

  <rect x="445" y="505" width="70" height="45" rx="4" fill="#fde68a" stroke="#ca8a04" stroke-width="1"/>
  <text x="480" y="523" text-anchor="middle" font-size="9" font-weight="bold" fill="#a16207">Confidence</text>
  <text x="480" y="537" text-anchor="middle" font-size="8" fill="#a16207">自信</text>

  <rect x="525" y="505" width="70" height="45" rx="4" fill="#fde68a" stroke="#ca8a04" stroke-width="1"/>
  <text x="560" y="523" text-anchor="middle" font-size="9" font-weight="bold" fill="#a16207">Risk</text>
  <text x="560" y="537" text-anchor="middle" font-size="8" fill="#a16207">风险</text>

  <rect x="445" y="555" width="70" height="35" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="480" y="572" text-anchor="middle" font-size="9" font-weight="bold" fill="#991b1b">Meta</text>
  <text x="480" y="584" text-anchor="middle" font-size="8" fill="#991b1b">偏差</text>

  <line x1="320" y1="340" x2="305" y2="370" stroke="#666" stroke-width="1" stroke-dasharray="4"/>
  <line x1="400" y1="340" x2="450" y2="370" stroke="#666" stroke-width="1" stroke-dasharray="4"/>
  <line x1="540" y1="340" x2="595" y2="370" stroke="#666" stroke-width="1" stroke-dasharray="4"/>

  <!-- Legend -->
  <rect x="30" y="520" width="180" height="110" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="45" y="540" font-size="11" font-weight="bold" fill="#475569">图例</text>
  <rect x="45" y="550" width="12" height="12" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="62" y="560" font-size="10" fill="#475569">外部世界</text>
  <rect x="45" y="565" width="12" height="12" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="62" y="575" font-size="10" fill="#475569">Radar 感知层</text>
  <rect x="45" y="580" width="12" height="12" fill="#dcfce7" stroke="#22c55e"/>
  <text x="62" y="590" font-size="10" fill="#475569">Cognition 认知层</text>
  <rect x="45" y="595" width="12" height="12" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="62" y="605" font-size="10" fill="#475569">ManasEngine 决策层</text>
</svg>