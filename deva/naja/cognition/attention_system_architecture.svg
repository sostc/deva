  <text x="700" y="395" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">⚡ 快思考 · Manas 末那识</text>

  <rect x="100" y="420" width="550" height="180" rx="10" fill="white"/>
  <text x="375" y="450" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e94560" text-anchor="middle">ManasEngine.compute()</text>
  <text x="375" y="480" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50" text-anchor="middle">raw_manas = 0.4×timing + 0.3×regime + 0.3×confidence</text>

  <text x="120" y="510" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d" text-anchor="start">📈 影响因子:</text>
  <text x="120" y="530" font-family="Arial, sans-serif" font-size="12" fill="#27ae60" text-anchor="start">• problem_opportunity (供需问题) → +20% 加成</text>
  <text x="120" y="550" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c" text-anchor="start">• narrative_risk (供应链风险) → -50% 惩罚</text>
  <text x="120" y="570" font-family="Arial, sans-serif" font-size="12" fill="#3498db" text-anchor="start">• ai_compute_trend (AI算力) → +15% / -10%</text>

  <rect x="700" y="420" width="300" height="180" rx="10" fill="white"/>
  <text x="850" y="450" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e94560" text-anchor="middle">输出</text>
  <text x="850" y="480" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50" text-anchor="middle">manas_score (0-1)</text>
  <text x="850" y="505" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50" text-anchor="middle">should_act</text>
