  <text x="700" y="1355" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1b4332" text-anchor="middle">_apply_awakening_adjustments() 信号调整</text>

  <text x="130" y="1385" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d" text-anchor="start">1. volatility_regime → position_multiplier:</text>
  <text x="130" y="1405" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c" text-anchor="start">   high_volatile → ×0.5 | spike → ×0.2</text>

  <text x="500" y="1385" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d" text-anchor="start">2. awakening_level:</text>
  <text x="500" y="1405" font-family="Arial, sans-serif" font-size="12" fill="#9b59b6" text-anchor="start">   enlightened → +0.1 | awakening → +0.05</text>

  <text x="850" y="1385" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d" text-anchor="start">3. fp_insights → confidence + position:</text>
  <text x="850" y="1405" font-family="Arial, sans-serif" font-size="12" fill="#f39c12" text-anchor="start">   opportunity → ×1.20 | risk → ×0.70</text>

