  <text x="640" y="820" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c" text-anchor="start">risk + first_principles:</text>
  <text x="640" y="838" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c" text-anchor="start">   -15% confidence, ×0.70 position</text>
  <text x="640" y="860" font-family="Arial, sans-serif" font-size="11" fill="#f39c12" text-anchor="start">contradiction:</text>
  <text x="640" y="878" font-family="Arial, sans-serif" font-size="11" fill="#f39c12" text-anchor="start">   阻止信号 (BLOCK)</text>

