  <rect x="920" y="1060" width="390" height="160" rx="10" fill="white"/>
  <text x="1115" y="1090" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#533483" text-anchor="middle">Pattern Archive 模式归档</text>
  <text x="1115" y="1120" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" text-anchor="middle">archive_pattern() - 归档成功模式</text>
  <text x="1115" y="1145" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" text-anchor="middle">recall() - 召回历史模式</text>
  <text x="1115" y="1170" font-family="Arial, sans-serif" font-size="12" fill="#27ae60" text-anchor="middle">enlightened: +0.1 confidence</text>
  <text x="1115" y="1195" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d" text-anchor="middle">历史经验影响当前决策</text>

