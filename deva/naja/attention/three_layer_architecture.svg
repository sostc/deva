<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 820">
  <defs>
    <linearGradient id="worldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e8ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="usGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fff4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dcfce7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="validGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff7f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed7aa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fusionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#faf5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ede9fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="focusGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbf7d0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#94a3b8" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6366f1"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ea580c"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#1e293b" text-anchor="middle">三层分离 · 差异验证架构</text>
  <text x="480" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">市场归市场 · 新闻归新闻 · 我们归我们 · 主动关注统一入口</text>

  <!-- ==================== 主动关注入口 ==================== -->
  <g transform="translate(310, 75)">
    <rect width="340" height="80" rx="16" fill="url(#focusGrad)" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="340" height="36" rx="16" fill="#16a34a"/>
    <rect y="18" width="340" height="18" fill="#16a34a"/>
    <text x="170" y="24" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">🎯 AttentionFocusManager 主动关注入口</text>

    <!-- Three APIs -->
    <rect x="15" y="46" width="95" height="26" rx="6" fill="white" stroke="#86efac" stroke-width="1"/>
    <text x="62" y="63" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#15803d" text-anchor="middle">follow_narrative("AI")</text>

    <rect x="122" y="46" width="95" height="26" rx="6" fill="white" stroke="#86efac" stroke-width="1"/>
    <text x="170" y="63" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#15803d" text-anchor="middle">follow_block("AI")</text>

    <rect x="230" y="46" width="95" height="26" rx="6" fill="white" stroke="#86efac" stroke-width="1"/>
    <text x="278" y="63" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#15803d" text-anchor="middle">follow_stock("NVDA")</text>
  </g>

  <!-- Arrow: FocusManager -> Us Layer -->
  <path d="M 480 155 L 480 180" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="480" y="172" font-family="system-ui, sans-serif" font-size="9" fill="#15803d" text-anchor="middle">关注数据</text>

  <!-- ==================== 外部世界层 ==================== -->
  <g transform="translate(40, 185)">
    <rect width="255" height="250" rx="16" fill="url(#worldGrad)" stroke="#c7d2fe" stroke-width="1.5" filter="url(#shadow)"/>

    <rect width="255" height="40" rx="16" fill="#6366f1"/>
    <rect y="20" width="255" height="20" fill="#6366f1"/>
    <text x="127" y="26" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">🌐 外部世界</text>

    <rect x="12" y="52" width="231" height="80" rx="10" fill="white" stroke="#a5b4fc" stroke-width="1"/>
    <text x="127" y="70" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6366f1" text-anchor="middle">新闻叙事 WorldNarrative</text>
    <text x="127" y="88" font-family="system-ui, sans-serif" font-size="11" fill="#475569" text-anchor="middle">AI: 0.8  ·  芯片: 0.6  ·  新能源: 0.4</text>
    <text x="127" y="106" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">（编辑选择，非市场定价）</text>
    <text x="127" y="120" font-family="monospace" font-size="9" fill="#818cf8" text-anchor="middle">NarrativeTracker</text>

    <rect x="12" y="140" width="231" height="98" rx="10" fill="white" stroke="#a5b4fc" stroke-width="1"/>
    <text x="127" y="158" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6366f1" text-anchor="middle">市场注意力 MarketAttention</text>
    <text x="127" y="176" font-family="system-ui, sans-serif" font-size="11" fill="#475569" text-anchor="middle">AI: 0.72  ·  芯片: 0.45  ·  新能源: 0.31</text>
    <text x="127" y="192" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">（定价过程自然涌现的热度）</text>
    <text x="127" y="226" font-family="monospace" font-size="9" fill="#818cf8" text-anchor="middle">BlockAttentionEngine</text>
  </g>

  <!-- ==================== 我们自己层 ==================== -->
  <g transform="translate(322, 185)">
    <rect width="316" height="250" rx="16" fill="url(#usGrad)" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>

    <rect width="316" height="40" rx="16" fill="#16a34a"/>
    <rect y="20" width="316" height="20" fill="#16a34a"/>
    <text x="158" y="26" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">🏠 我们自己</text>

    <rect x="12" y="52" width="140" height="125" rx="10" fill="white" stroke="#86efac" stroke-width="1"/>
    <text x="82" y="70" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#16a34a" text-anchor="middle">持仓 Portfolio</text>
    <text x="82" y="88" font-family="monospace" font-size="10" fill="#15803d" text-anchor="middle">NVDA · MSFT</text>
    <text x="82" y="104" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">TSLA · ...</text>
    <text x="82" y="140" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">实际持有的标的</text>
    <text x="82" y="158" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">来自 PortfolioManager</text>

    <rect x="164" y="52" width="140" height="125" rx="10" fill="white" stroke="#86efac" stroke-width="1"/>
    <text x="234" y="70" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#16a34a" text-anchor="middle">自选 Watchlist</text>
    <text x="234" y="88" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">AMD · ASML</text>
    <text x="234" y="104" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">SMCI · ...</text>
    <text x="234" y="140" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">关注但未持有的标的</text>
    <text x="234" y="158" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">来自 NB("naja_watchlist")</text>

    <rect x="12" y="187" width="292" height="51" rx="10" fill="white" stroke="#86efac" stroke-width="1"/>
    <text x="158" y="203" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#16a34a" text-anchor="middle">我们关注的叙事 WatchedNarratives</text>
    <text x="158" y="220" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">从持仓/自选推导 + 主动 follow_narrative()</text>
    <text x="158" y="234" font-family="monospace" font-size="9" fill="#15803d" text-anchor="middle">FocusManager</text>
  </g>

  <!-- ==================== 差异验证层 ==================== -->
  <g transform="translate(665, 185)">
    <rect width="255" height="250" rx="16" fill="url(#validGrad)" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>

    <rect width="255" height="40" rx="16" fill="#ea580c"/>
    <rect y="20" width="255" height="20" fill="#ea580c"/>
    <text x="127" y="26" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">🔍 差异验证</text>

    <rect x="12" y="52" width="231" height="185" rx="10" fill="white" stroke="#fed7aa" stroke-width="1"/>

    <rect x="20" y="60" width="215" height="38" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
    <text x="127" y="74" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#15803d" text-anchor="middle">✅ 共识 Consensus</text>
    <text x="127" y="89" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">我们关注 ∩ 外部热 → 信念强</text>

    <rect x="20" y="105" width="215" height="38" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
    <text x="127" y="119" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e" text-anchor="middle">⚠️ 分歧 Divergence</text>
    <text x="127" y="134" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">我们关注 ∩ 外部冷 → 等待验证</text>

    <rect x="20" y="150" width="215" height="38" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
    <text x="127" y="164" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#6d28d9" text-anchor="middle">👁️ 盲区 Blind Spots</text>
    <text x="127" y="179" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">外部热 ∩ 我们未关注 → 潜在机会</text>

    <rect x="20" y="198" width="215" height="30" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="60" y="217" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569">信念度</text>
    <text x="200" y="217" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ea580c" text-anchor="end">0.72</text>
    <text x="127" y="232" font-family="monospace" font-size="9" fill="#ea580c" text-anchor="middle">ConvictionValidator</text>
  </g>

  <!-- Arrows: World/Us -> Validation -->
  <path d="M 295 310 L 320 310" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowPurple)" opacity="0.6"/>
  <text x="308" y="304" font-family="system-ui, sans-serif" font-size="9" fill="#6366f1">外部热点</text>

  <path d="M 638 310 L 663 310" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowGreen)" opacity="0.6"/>
  <text x="651" y="304" font-family="system-ui, sans-serif" font-size="9" fill="#16a34a">我们关注</text>

  <!-- ==================== 时机选择 ==================== -->
  <g transform="translate(40, 450)">
    <rect width="880" height="100" rx="16" fill="url(#fusionGrad)" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>

    <text x="440" y="24" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#7c3aed" text-anchor="middle">⏱️ 时机选择 Timing</text>
    <text x="440" y="42" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">热度低 = 布局窗口 · 热度高 = 兑现窗口 · 分歧大 = 等待</text>

    <rect x="30" y="55" width="260" height="35" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
    <text x="160" y="69" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#15803d" text-anchor="middle">🟢 timing_good</text>
    <text x="160" y="83" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">信念强 + 热度低 → 布局窗口</text>

    <rect x="310" y="55" width="260" height="35" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <text x="440" y="69" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#dc2626" text-anchor="middle">🔴 timing_hot</text>
    <text x="440" y="83" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">信念强 + 热度高 → 价值已反映</text>

    <rect x="590" y="55" width="260" height="35" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
    <text x="720" y="69" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e" text-anchor="middle">🟡 timing_wait</text>
    <text x="720" y="83" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">分歧大 → 等待验证</text>
  </g>

  <!-- ==================== 融合输出 ==================== -->
  <g transform="translate(40, 565)">
    <rect width="880" height="145" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>

    <text x="440" y="24" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b" text-anchor="middle">🧠 AttentionFusion 融合层</text>

    <rect x="30" y="38" width="820" height="36" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
    <text x="440" y="58" font-family="monospace" font-size="13" fill="#334155" text-anchor="middle">
      fused_score = α × conviction + β × market_attention + γ × timing_bonus
    </text>

    <rect x="30" y="82" width="220" height="55" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
    <text x="140" y="97" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#6d28d9" text-anchor="middle">α=0.4 信念权重</text>
    <text x="140" y="113" font-family="system-ui, sans-serif" font-size="10" fill="#7c3aed" text-anchor="middle">我们关注的一致性</text>
    <text x="140" y="128" font-family="monospace" font-size="9" fill="#6d28d9" text-anchor="middle">FocusManager</text>

    <rect x="265" y="82" width="220" height="55" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1"/>
    <text x="375" y="97" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#4338ca" text-anchor="middle">β=0.4 市场热度</text>
    <text x="375" y="113" font-family="system-ui, sans-serif" font-size="10" fill="#6366f1" text-anchor="middle">外部世界的热度传感器</text>
    <text x="375" y="128" font-family="monospace" font-size="9" fill="#4338ca" text-anchor="middle">BlockAttentionEngine</text>

    <rect x="500" y="82" width="220" height="55" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
    <text x="610" y="97" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e" text-anchor="middle">γ=0.2 时机加成</text>
    <text x="610" y="113" font-family="system-ui, sans-serif" font-size="10" fill="#ca8a04" text-anchor="middle">布局窗口 vs 兑现窗口</text>
    <text x="610" y="128" font-family="monospace" font-size="9" fill="#92400e" text-anchor="middle">TimingEngine</text>

    <rect x="735" y="82" width="115" height="55" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
    <text x="792" y="97" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569" text-anchor="middle">输出</text>
    <text x="792" y="113" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">ManasEngine</text>
    <text x="792" y="128" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">决策</text>
  </g>

  <!-- ==================== 底部：核心原则 ==================== -->
  <g transform="translate(40, 725)">
    <rect width="880" height="75" rx="12" fill="#fafafa" stroke="#e2e8f0" stroke-width="1"/>

    <text x="30" y="22" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">主动关注 API（AttentionFocusManager）</text>

    <rect x="30" y="32" width="12" height="12" rx="3" fill="#16a34a"/>
    <text x="50" y="42" font-family="system-ui, sans-serif" font-size="10" fill="#475569">follow_narrative("AI", priority=0.9)  关注叙事 → 自动映射到 block</text>

    <rect x="420" y="32" width="12" height="12" rx="3" fill="#16a34a"/>
    <text x="440" y="42" font-family="system-ui, sans-serif" font-size="10" fill="#475569">follow_block("semiconductor")  关注题材 → 加入关注列表</text>

    <rect x="710" y="32" width="12" height="12" rx="3" fill="#16a34a"/>
    <text x="730" y="42" font-family="system-ui, sans-serif" font-size="10" fill="#475569">follow_stock("NVDA")  关注股票 → 加入自选</text>

    <text x="30" y="62" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">新闻叙事 ≠ 市场热度 ≠ 我们关注 · 三者必须分离 · 验证层只做比较不做选择 · 主动关注是用户意图输入</text>
  </g>
</svg>
