func_code: |
  """
  行情快照保存开关

  功能：
  - 查询当前快照保存状态
  - 启用/禁用快照保存

  注意：此任务无轮询，通过手动调用 enable/disable 来控制
  """

  def execute():
      """查询当前快照保存状态"""
      from deva.naja.attention.realtime_data_fetcher import get_data_fetcher

      fetcher = get_data_fetcher()
      if fetcher is None:
          return {"success": False, "message": "RealtimeDataFetcher 未启动"}

      stats = fetcher.get_stats()
      return {
          "success": True,
          "save_snapshot_enabled": fetcher.is_snapshot_save_enabled(),
          "snapshot_save_count": stats.get('snapshot_save_count'),
          "last_snapshot_save_time": stats.get('last_snapshot_save_time'),
          "running": stats.get('running'),
          "is_trading": stats.get('is_trading'),
      }

  def enable():
      """启用快照保存"""
      from deva.naja.attention.realtime_data_fetcher import get_data_fetcher
      fetcher = get_data_fetcher()
      if fetcher is None:
          return {"success": False, "message": "RealtimeDataFetcher 未启动"}
      fetcher.enable_snapshot_save()
      return {"success": True, "message": "快照保存已启用"}

  def disable():
      """禁用快照保存"""
      from deva.naja.attention.realtime_data_fetcher import get_data_fetcher
      fetcher = get_data_fetcher()
      if fetcher is None:
          return {"success": False, "message": "RealtimeDataFetcher 未启动"}
      fetcher.disable_snapshot_save()
      return {"success": True, "message": "快照保存已禁用"}
