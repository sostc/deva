func_code: "import datetime\nimport time\nfrom deva import NB\n\ndef is_tradedate(dt=None):\n\
  \    try:\n        if dt is None:\n            dt = datetime.datetime.now()\n  \
  \      if dt.weekday() >= 5:\n            return False\n        holidays = [(1,\
  \ 1), (5, 1), (10, 1)]\n        current_date = (dt.month, dt.day)\n        return\
  \ current_date not in holidays\n    except Exception:\n        return True\n\ndef\
  \ is_tradetime(dt=None):\n    try:\n        if dt is None:\n            dt = datetime.datetime.now()\n\
  \        if not is_tradedate(dt):\n            return False\n        current_time\
  \ = dt.time()\n        pre = datetime.time(9, 15) <= current_time <= datetime.time(9,\
  \ 30)\n        morn = datetime.time(9, 30) <= current_time <= datetime.time(11,\
  \ 30)\n        aft = datetime.time(13, 0) <= current_time <= datetime.time(15, 0)\n\
  \        after = datetime.time(15, 0) <= current_time <= datetime.time(15, 30)\n\
  \        return pre or morn or aft or after\n    except Exception:\n        return\
  \ True\n\ndef execute():\n    from deva.naja.datasource import get_datasource_manager\n\
  \    \n    if not is_tradetime():\n        return {\"success\": False, \"message\"\
  : \"Not trading time\"}\n    \n    try:\n        mgr = get_datasource_manager()\n\
  \        \n        ds = mgr.get(\"e626eecd0b86\")\n        \n        if ds is None:\n\
  \            return {\"success\": False, \"message\": \"DataSource not found\"}\n\
  \        \n        latest_data = ds.get_latest_data()\n        \n        if latest_data\
  \ is None:\n            return {\"success\": False, \"message\": \"No latest data\"\
  }\n        \n        snapshot_db = NB(\"quant_snapshot_5min_window\", key_mode=\"\
  time\")\n        snapshot_db.append(latest_data)\n        \n        record_count\
  \ = len(latest_data) if isinstance(latest_data, list) else 1\n        \n       \
  \ return {\n            \"success\": True,\n            \"message\": f\"Appended\
  \ {record_count} records\",\n            \"record_count\": record_count,\n     \
  \   }\n    except Exception as e:\n        return {\"success\": False, \"message\"\
  : str(e)}\n"
