func_code: |
  """
  盘后市场分析 + 每日反思任务

  功能：
  1. 获取主要指数行情（纳指、标普、QQQ、VIX等）
  2. 分析市场状态，存储供LLM反思使用
  3. 触发LLM反思，生成每日反思报告

  建议执行时间：美股收盘后（凌晨4:30-5:00）
  执行间隔：每天一次
  """
  def execute():
      from deva.naja.cognition.insight.llm_reflection import get_llm_reflection_engine
      engine = get_llm_reflection_engine()
      if not engine:
          return {"success": False, "message": "LLMReflectionEngine 未启动"}

      result = engine.run_daily_reflection()
      if result:
          return {
              "success": True,
              "reflection_theme": result.theme,
              "reflection_summary": result.summary[:200],
          }
      return {"success": False, "message": "反思生成失败"}
