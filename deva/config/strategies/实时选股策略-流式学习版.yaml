func_code: "\nimport time\nimport json\nfrom collections import defaultdict\nfrom\
  \ typing import Dict, List, Any\nimport pandas as pd\nimport numpy as np\n\n# River\
  \ 在线学习库\ntry:\n    from river import linear_model\n    from river import preprocessing\n\
  \    from river import optim\n    RIVER_AVAILABLE = True\nexcept ImportError:\n\
  \    RIVER_AVAILABLE = False\n\n# 策略状态（持久化）\nstrategy_state = {\n    \"model\":\
  \ None,\n    \"scaler\": None,\n    \"positions\": {},  # 当前持仓\n    \"stock_history\"\
  : defaultdict(list),  # 股票历史数据\n    \"trade_history\": [],  # 交易历史\n    \"initial_capital\"\
  : 100000.0,\n    \"current_capital\": 100000.0,\n    \"signals_generated\": 0,\n\
  \    \"last_update\": time.time()\n}\n\n# 策略参数\nPARAMS = {\n    \"model_type\":\
  \ \"logistic\",\n    \"learning_rate\": 0.01,\n    \"buy_threshold\": 0.55,\n  \
  \  \"sell_threshold\": -0.05,\n    \"max_positions\": 5,\n    \"feature_window\"\
  : 3\n}\n\ndef init_model():\n    \"\"\"初始化 River 模型\"\"\"\n    if not RIVER_AVAILABLE:\n\
  \        return None, None\n    \n    if PARAMS[\"model_type\"] == \"logistic\"\
  :\n        model = linear_model.LogisticRegression(optimizer=optim.SGD(PARAMS[\"\
  learning_rate\"]))\n    elif PARAMS[\"model_type\"] == \"linear\":\n        model\
  \ = linear_model.LinearRegression(optimizer=optim.SGD(PARAMS[\"learning_rate\"]))\n\
  \    else:\n        model = linear_model.PARegressor()\n    \n    scaler = preprocessing.StandardScaler()\n\
  \    return model, scaler\n\ndef extract_features(code: str) -> Dict[str, float]:\n\
  \    \"\"\"提取股票特征\"\"\"\n    history = strategy_state[\"stock_history\"].get(code,\
  \ [])\n    if len(history) < PARAMS[\"feature_window\"]:\n        return {}\n  \
  \  \n    recent = history[-PARAMS[\"feature_window\"]:]\n    prices = [h[\"price\"\
  ] for h in recent]\n    volumes = [h[\"volume\"] for h in recent]\n    \n    return\
  \ {\n        \"price_change\": (prices[-1] - prices[0]) / prices[0] * 100 if prices[0]\
  \ > 0 else 0,\n        \"volatility\": np.std(prices) / np.mean(prices) * 100 if\
  \ np.mean(prices) > 0 else 0,\n        \"volume_ratio\": volumes[-1] / np.mean(volumes)\
  \ if np.mean(volumes) > 0 else 1.0,\n    }\n\ndef predict_score(features: Dict[str,\
  \ float]) -> float:\n    \"\"\"预测选股得分\"\"\"\n    if not features or strategy_state[\"\
  model\"] is None:\n        return 0.5\n    \n    try:\n        scaled = strategy_state[\"\
  scaler\"].learn_one(features).transform_one(features)\n        proba = strategy_state[\"\
  model\"].predict_proba_one(scaled)\n        return proba.get(True, 0.5) if isinstance(proba,\
  \ dict) else 0.5\n    except:\n        return 0.5\n\ndef update_model(features:\
  \ Dict[str, float], profit: float):\n    \"\"\"在线更新模型\"\"\"\n    if strategy_state[\"\
  model\"] is None or not features:\n        return\n    \n    try:\n        scaled\
  \ = strategy_state[\"scaler\"].learn_one(features).transform_one(features)\n   \
  \     strategy_state[\"model\"].learn_one(scaled, profit > 0)\n    except:\n   \
  \     pass\n\ndef process(data, context=None):\n    \"\"\"\n    策略主处理函数\n    \n\
  \    输入: 行情数据帧\n    输出: 交易信号列表\n    \"\"\"\n    # 初始化模型\n    if strategy_state[\"\
  model\"] is None and RIVER_AVAILABLE:\n        strategy_state[\"model\"], strategy_state[\"\
  scaler\"] = init_model()\n    \n    signals = []\n    \n    # 获取数据\n    raw_data\
  \ = data.get(\"data\", {})\n    datasource_name = data.get(\"_datasource_name\"\
  , \"unknown\")\n    timestamp = data.get(\"_timestamp\", time.time())\n    \n  \
  \  # 解析 DataFrame\n    if isinstance(raw_data, dict) and \"data\" in raw_data:\n\
  \        df = pd.DataFrame(raw_data[\"data\"])\n    elif isinstance(raw_data, pd.DataFrame):\n\
  \        df = raw_data\n    else:\n        return {\"signals\": [], \"message\"\
  : \"Invalid data format\"}\n    \n    # 更新持仓价格\n    for code, pos in list(strategy_state[\"\
  positions\"].items()):\n        stock_data = df[df[\"code\"] == code]\n        if\
  \ not stock_data.empty:\n            pos[\"current_price\"] = float(stock_data.iloc[0].get(\"\
  now\", pos[\"buy_price\"]))\n    \n    # 检查止损并生成 SELL 信号\n    for code in list(strategy_state[\"\
  positions\"].keys()):\n        pos = strategy_state[\"positions\"][code]\n     \
  \   profit_pct = (pos[\"current_price\"] - pos[\"buy_price\"]) / pos[\"buy_price\"\
  ] * 100\n        \n        if profit_pct < PARAMS[\"sell_threshold\"] * 100:\n \
  \           # 生成 SELL 信号\n            sell_signal = {\n                \"signal_type\"\
  : \"SELL\",\n                \"stock_code\": code,\n                \"stock_name\"\
  : pos[\"name\"],\n                \"price\": pos[\"current_price\"],\n         \
  \       \"volume\": pos[\"volume\"],\n                \"confidence\": min(abs(profit_pct)\
  \ / 10, 1.0),\n                \"reason\": f\"止损卖出，亏损 {profit_pct:.2f}%\",\n   \
  \             \"timestamp\": timestamp\n            }\n            signals.append(sell_signal)\n\
  \            \n            # 更新资金\n            strategy_state[\"current_capital\"\
  ] += pos[\"current_price\"] * pos[\"volume\"]\n            \n            # 在线学习\n\
  \            features = extract_features(code)\n            if features:\n     \
  \           update_model(features, profit_pct)\n            \n            # 记录交易\n\
  \            strategy_state[\"trade_history\"].append({\n                \"type\"\
  : \"SELL\",\n                \"code\": code,\n                \"price\": pos[\"\
  current_price\"],\n                \"profit\": profit_pct,\n                \"timestamp\"\
  : timestamp\n            })\n            \n            # 移除持仓\n            del strategy_state[\"\
  positions\"][code]\n            strategy_state[\"signals_generated\"] += 1\n   \
  \ \n    # 选股并生成 BUY 信号\n    if len(strategy_state[\"positions\"]) < PARAMS[\"max_positions\"\
  ]:\n        candidates = []\n        \n        for _, row in df.iterrows():\n  \
  \          code = row.get(\"code\")\n            name = row.get(\"name\", code)\n\
  \            \n            if not code or code in strategy_state[\"positions\"]:\n\
  \                continue\n            \n            price = float(row.get(\"now\"\
  , row.get(\"close\", 0)))\n            volume = float(row.get(\"volume\", 0))\n\
  \            \n            if price <= 0:\n                continue\n          \
  \  \n            # 更新历史\n            strategy_state[\"stock_history\"][code].append({\n\
  \                \"price\": price,\n                \"volume\": volume,\n      \
  \          \"timestamp\": timestamp\n            })\n            \n            #\
  \ 限制历史长度\n            if len(strategy_state[\"stock_history\"][code]) > 20:\n  \
  \              strategy_state[\"stock_history\"][code] = strategy_state[\"stock_history\"\
  ][code][-20:]\n            \n            # 提取特征并预测\n            features = extract_features(code)\n\
  \            if features:\n                score = predict_score(features)\n   \
  \             if score > PARAMS[\"buy_threshold\"]:\n                    candidates.append((code,\
  \ name, score, price))\n        \n        # 买入得分最高的\n        candidates.sort(key=lambda\
  \ x: x[2], reverse=True)\n        \n        for code, name, score, price in candidates[:PARAMS[\"\
  max_positions\"] - len(strategy_state[\"positions\"])]:\n            buy_volume\
  \ = 100\n            cost = price * buy_volume\n            \n            if cost\
  \ > strategy_state[\"current_capital\"] * 0.2:  # 单只最多20%资金\n                continue\n\
  \            \n            # 生成 BUY 信号\n            buy_signal = {\n           \
  \     \"signal_type\": \"BUY\",\n                \"stock_code\": code,\n       \
  \         \"stock_name\": name,\n                \"price\": price,\n           \
  \     \"volume\": buy_volume,\n                \"confidence\": score,\n        \
  \        \"reason\": f\"River模型选股得分 {score:.3f}，超过阈值 {PARAMS['buy_threshold']}\"\
  ,\n                \"timestamp\": timestamp\n            }\n            signals.append(buy_signal)\n\
  \            \n            # 更新资金\n            strategy_state[\"current_capital\"\
  ] -= cost\n            \n            # 添加持仓\n            strategy_state[\"positions\"\
  ][code] = {\n                \"code\": code,\n                \"name\": name,\n\
  \                \"buy_price\": price,\n                \"current_price\": price,\n\
  \                \"volume\": buy_volume,\n                \"buy_time\": timestamp\n\
  \            }\n            \n            # 记录交易\n            strategy_state[\"\
  trade_history\"].append({\n                \"type\": \"BUY\",\n                \"\
  code\": code,\n                \"price\": price,\n                \"timestamp\"\
  : timestamp\n            })\n            \n            strategy_state[\"signals_generated\"\
  ] += 1\n    \n    # 计算当前总资产\n    total_value = strategy_state[\"current_capital\"\
  ] + sum(\n        pos[\"current_price\"] * pos[\"volume\"] for pos in strategy_state[\"\
  positions\"].values()\n    )\n    total_return = (total_value - strategy_state[\"\
  initial_capital\"]) / strategy_state[\"initial_capital\"] * 100\n    \n    # 更新状态\n\
  \    strategy_state[\"last_update\"] = time.time()\n    \n    return {\n       \
  \ \"signals\": signals,\n        \"signal_count\": len(signals),\n        \"positions_count\"\
  : len(strategy_state[\"positions\"]),\n        \"total_value\": total_value,\n \
  \       \"total_return\": total_return,\n        \"capital\": strategy_state[\"\
  current_capital\"],\n        \"datasource\": datasource_name,\n        \"timestamp\"\
  : timestamp,\n        \"message\": f\"生成 {len(signals)} 个交易信号，当前持仓 {len(strategy_state['positions'])}\
  \ 只，总收益率 {total_return:.2f}%\"\n    }\n"
